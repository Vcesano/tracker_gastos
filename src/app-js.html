<script>
  // It 1 (1a): carga rápida de gasto diario. Vanilla JS, sin frameworks.
  (function () {
    'use strict';

    var $ = function (id) { return document.getElementById(id); };
    var categorias = [];   // [{id, tipo, categoria, subcategoria}] activas
    var medios = [];       // [{id, entidad, tipo_medio}] activos

    var el = {
      formCard: $('form-card'),
      loadingCard: $('loading-card'),
      loadingStatus: $('loading-status'),
      form: $('form-gasto'),
      fecha: $('f-fecha'),
      tipo: $('f-tipo'),
      categoria: $('f-categoria'),
      subcategoria: $('f-subcategoria'),
      tipomedio: $('f-tipomedio'),
      medio: $('f-medio'),
      monto: $('f-monto'),
      moneda: $('f-moneda'),
      descripcion: $('f-descripcion'),
      submit: $('f-submit'),
      toast: $('toast')
    };

    // ---- Utilidades ----
    function hoyISO() {
      var d = new Date();
      var mm = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + mm + '-' + dd;
    }

    function distinct(arr) {
      var seen = {}, out = [];
      arr.forEach(function (v) { if (!seen[v]) { seen[v] = true; out.push(v); } });
      return out;
    }

    // Orden alfabético es-AR (case/acentos-insensible) por la etiqueta visible.
    function byLabel(a, b) {
      return String(a.label).localeCompare(String(b.label), 'es', { sensitivity: 'base' });
    }

    function fillSelect(sel, opciones, placeholder) {
      sel.innerHTML = '';
      var ph = document.createElement('option');
      ph.value = '';
      ph.textContent = placeholder;
      ph.disabled = true;
      ph.selected = true;
      sel.appendChild(ph);
      opciones.slice().sort(byLabel).forEach(function (o) {
        var opt = document.createElement('option');
        opt.value = o.value;
        opt.textContent = o.label;
        sel.appendChild(opt);
      });
    }

    var toastTimer = null;
    function toast(msg, tipo) {
      el.toast.textContent = msg;
      el.toast.className = 'toast ' + (tipo || '');
      el.toast.hidden = false;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { el.toast.hidden = true; }, 3200);
    }

    // ---- Monto con separador de miles es-AR (miles ".", decimal ",") ----
    // Los "." son siempre separadores de miles (los inserta este formateo); el
    // decimal se ingresa con "," (máx 2). Así el parseo queda sin ambigüedad.
    function formatMonto(raw) {
      var s = String(raw).replace(/[^\d,]/g, '');   // solo dígitos y coma (los "." se descartan)
      var firstComma = s.indexOf(',');
      var intPart, decPart = null;
      if (firstComma >= 0) {
        intPart = s.slice(0, firstComma).replace(/,/g, '');
        decPart = s.slice(firstComma + 1).replace(/,/g, '').slice(0, 2);
      } else {
        intPart = s;
      }
      intPart = intPart.replace(/^0+(?=\d)/, '');    // sin ceros a la izquierda
      var intFmt = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      if (intFmt === '' && decPart !== null) intFmt = '0';
      return decPart !== null ? intFmt + ',' + decPart : intFmt;
    }

    function parseMonto(str) {
      var s = String(str).replace(/\./g, '').replace(',', '.');
      return parseFloat(s);
    }

    // ---- Cascada Tipo → Categoría → Subcategoría ----
    // El value de la subcategoría ES el categoria_id (cada fila de Categorias
    // es un id único con su tipo/categoria/subcategoria).
    function onTipoChange() {
      var tipo = el.tipo.value;
      var cats = distinct(
        categorias.filter(function (c) { return c.tipo === tipo; })
                  .map(function (c) { return c.categoria; })
      ).map(function (cat) { return { value: cat, label: cat }; });
      fillSelect(el.categoria, cats, 'Elegí categoría…');
      el.categoria.disabled = false;
      fillSelect(el.subcategoria, [], 'Elegí categoría primero…');
      el.subcategoria.disabled = true;
    }

    function onCategoriaChange() {
      var tipo = el.tipo.value, cat = el.categoria.value;
      var rows = categorias.filter(function (c) {
        return c.tipo === tipo && c.categoria === cat;
      }).map(function (c) {
        return { value: c.id, label: c.subcategoria || '(sin subcategoría)' };
      });
      fillSelect(el.subcategoria, rows, 'Elegí subcategoría…');
      el.subcategoria.disabled = false;
      if (rows.length === 1) el.subcategoria.value = rows[0].value;
    }

    // ---- Cascada Tipo de medio → Medio de pago ----
    function onTipoMedioChange() {
      var tm = el.tipomedio.value;
      var opts = medios.filter(function (m) { return m.tipo_medio === tm; })
                       .map(function (m) { return { value: m.id, label: m.entidad }; });
      fillSelect(el.medio, opts, 'Elegí medio…');
      el.medio.disabled = false;
      if (opts.length === 1) el.medio.value = opts[0].value;
    }

    // ---- Carga inicial de catálogos ----
    function cargarCatalogos() {
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok) {
            el.loadingStatus.textContent = '✗ ' + ((res && res.error) || 'No se pudieron cargar los catálogos.');
            el.loadingStatus.className = 'err';
            return;
          }
          categorias = res.data.categorias || [];
          medios = res.data.medios || [];

          if (!categorias.length || !medios.length) {
            el.loadingStatus.textContent = '✗ Faltan categorías o medios de pago activos en la Sheet.';
            el.loadingStatus.className = 'err';
            return;
          }

          var tipos = distinct(categorias.map(function (c) { return c.tipo; }))
            .map(function (t) { return { value: t, label: t }; });
          fillSelect(el.tipo, tipos, 'Elegí tipo…');

          // Tipos de medio: derivados de los datos, EXCLUYENDO "Credito" (una
          // tarjeta de crédito no es medio de un gasto directo — ver It 2).
          var tiposMedio = distinct(
            medios.map(function (m) { return m.tipo_medio; })
                  .filter(function (t) { return t !== 'Credito'; })
          ).map(function (t) { return { value: t, label: t }; });
          fillSelect(el.tipomedio, tiposMedio, 'Elegí tipo de medio…');
          fillSelect(el.medio, [], 'Elegí tipo de medio primero…');
          el.medio.disabled = true;

          el.fecha.value = hoyISO();
          el.loadingCard.hidden = true;
          el.formCard.hidden = false;
        })
        .withFailureHandler(function (err) {
          el.loadingStatus.textContent = '✗ Error de conexión: ' + (err && err.message ? err.message : err);
          el.loadingStatus.className = 'err';
        })
        .getCatalogos();
    }

    // ---- Submit ----
    function onSubmit(ev) {
      ev.preventDefault();

      var monto = parseMonto(el.monto.value);
      if (!isFinite(monto) || monto <= 0) { toast('El monto debe ser mayor a 0.', 'err'); el.monto.focus(); return; }
      if (!el.subcategoria.value) { toast('Elegí una categoría completa.', 'err'); return; }
      if (!el.medio.value) { toast('Elegí un medio de pago.', 'err'); return; }

      var payload = {
        fecha: el.fecha.value,
        descripcion: el.descripcion.value,
        categoria_id: el.subcategoria.value,
        medio_pago_id: el.medio.value,
        monto: monto,
        moneda: el.moneda.value
      };

      el.submit.disabled = true;
      el.submit.textContent = 'Guardando…';

      google.script.run
        .withSuccessHandler(function (res) {
          el.submit.disabled = false;
          el.submit.textContent = 'Guardar gasto';
          if (res && res.ok) {
            toast('✓ Gasto guardado', 'ok');
            // Reset para carga rápida: conservo fecha/categoría/medio/moneda.
            el.monto.value = '';
            el.descripcion.value = '';
            el.monto.focus();
          } else {
            toast('✗ ' + ((res && res.error) || 'No se pudo guardar.'), 'err');
          }
        })
        .withFailureHandler(function (err) {
          el.submit.disabled = false;
          el.submit.textContent = 'Guardar gasto';
          toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err');
        })
        .crearGasto(payload);
    }

    // ---- Wire up ----
    el.tipo.addEventListener('change', onTipoChange);
    el.categoria.addEventListener('change', onCategoriaChange);
    el.tipomedio.addEventListener('change', onTipoMedioChange);
    el.monto.addEventListener('input', function () { el.monto.value = formatMonto(el.monto.value); });
    el.form.addEventListener('submit', onSubmit);
    cargarCatalogos();
  })();
</script>
