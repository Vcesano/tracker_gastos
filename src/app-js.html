<script>
  // It 1 (1a + 1b): carga y historial de gastos. Vanilla JS, sin frameworks.
  (function () {
    'use strict';

    var $ = function (id) { return document.getElementById(id); };
    var categorias = [];   // [{id, tipo, categoria, subcategoria}] activas
    var medios = [];       // [{id, entidad, tipo_medio}] activos
    var tarjetas = [];     // [{id, entidad, tipo_medio}] activos con tipo_medio Credito
    var optTipos = [];     // opciones de "Tipo" (categorías)
    var optTiposMedio = [];// opciones de "Tipo de medio" (sin Credito)
    var editId = null;     // id del gasto en edición; null = alta
    var histActuales = []; // últimos gastos listados (para resolver Editar)

    var el = {
      tabs: $('tabs'),
      btnRefresh: $('btn-refresh'),
      loadingCard: $('loading-card'),
      loadingStatus: $('loading-status'),
      // form
      formCard: $('form-card'),
      formTitle: $('form-title'),
      editBanner: $('edit-banner'),
      editCancel: $('edit-cancel'),
      form: $('form-gasto'),
      fecha: $('f-fecha'),
      tipo: $('f-tipo'),
      categoria: $('f-categoria'),
      subcategoria: $('f-subcategoria'),
      tipomedio: $('f-tipomedio'),
      medio: $('f-medio'),
      monto: $('f-monto'),
      moneda: $('f-moneda'),
      descripcion: $('f-descripcion'),
      submit: $('f-submit'),
      limpiar: $('f-limpiar'),
      // historial
      histCard: $('historial-card'),
      hDesde: $('h-desde'),
      hHasta: $('h-hasta'),
      hCategoria: $('h-categoria'),
      hSubcategoria: $('h-subcategoria'),
      hMedio: $('h-medio'),
      hCuotas: $('h-cuotas'),
      hTarjeta: $('h-tarjeta'),
      hLimpiar: $('h-limpiar'),
      histResumen: $('hist-resumen'),
      histList: $('hist-list'),
      // maestros
      mEditor: $('m-editor'),
      mEditorTitle: $('m-editor-title'),
      mFieldsCat: $('m-fields-cat'),
      mFieldsMed: $('m-fields-med'),
      mCatTipo: $('m-cat-tipo'),
      mCatCategoria: $('m-cat-categoria'),
      mCatSubcategoria: $('m-cat-subcategoria'),
      mMedTipo: $('m-med-tipo'),
      mMedEntidad: $('m-med-entidad'),
      mSave: $('m-save'),
      mCancel: $('m-cancel'),
      mNuevo: $('m-nuevo'),
      mBuscar: $('m-buscar'),
      mEstado: $('m-estado'),
      mResumen: $('m-resumen'),
      mList: $('m-list'),
      dlTipos: $('dl-tipos'),
      dlCategorias: $('dl-categorias'),
      dlTipoMedios: $('dl-tipomedios'),
      // crédito (compras en cuotas)
      cEditor: $('c-editor'),
      cEditorTitle: $('c-editor-title'),
      cFecha: $('c-fecha'),
      cDescripcion: $('c-descripcion'),
      cTarjeta: $('c-tarjeta'),
      cTipo: $('c-tipo'),
      cCategoria: $('c-categoria'),
      cSubcategoria: $('c-subcategoria'),
      cMonto: $('c-monto'),
      cMoneda: $('c-moneda'),
      cNcuotas: $('c-ncuotas'),
      cNota: $('c-nota'),
      cSave: $('c-save'),
      cCancel: $('c-cancel'),
      cNuevo: $('c-nuevo'),
      cFiltroTarjeta: $('c-filtro-tarjeta'),
      cFiltroEstado: $('c-filtro-estado'),
      cResumen: $('c-resumen'),
      cList: $('c-list'),
      credCompras: $('cred-compras'),
      credPendientes: $('cred-pendientes'),
      pTarjeta: $('p-tarjeta'),
      pResumen: $('p-resumen'),
      pList: $('p-list'),
      // resumen de tarjeta (batch)
      rConfig: $('r-config'),
      rTarjeta: $('r-tarjeta'),
      rFecha: $('r-fecha'),
      rMedio: $('r-medio'),
      rGenerar: $('r-generar'),
      rGridWrap: $('r-grid-wrap'),
      rGridInfo: $('r-grid-info'),
      rGrid: $('r-grid'),
      rAddSuelto: $('r-add-suelto'),
      rReset: $('r-reset'),
      rTotal: $('r-total'),
      rConfirmar: $('r-confirmar'),
      toast: $('toast')
    };

    var maestros = { categorias: [], medios: [] };
    var masterActual = 'categorias';   // 'categorias' | 'medios'
    var mEditId = null;                // id en edición; null = alta

    // ---- Utilidades ----
    function hoyISO() {
      var d = new Date();
      var mm = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + mm + '-' + dd;
    }

    // ISO yyyy-mm-dd → dd/mm/yyyy para mostrar.
    function fmtFecha(iso) {
      var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(String(iso));
      return m ? m[3] + '/' + m[2] + '/' + m[1] : String(iso);
    }

    function distinct(arr) {
      var seen = {}, out = [];
      arr.forEach(function (v) { if (!seen[v]) { seen[v] = true; out.push(v); } });
      return out;
    }

    function findById(arr, id) {
      for (var i = 0; i < arr.length; i++) if (String(arr[i].id) === String(id)) return arr[i];
      return null;
    }

    function byLabel(a, b) {
      return String(a.label).localeCompare(String(b.label), 'es', { sensitivity: 'base' });
    }

    function fmtMoneda(n, moneda) {
      var s = new Intl.NumberFormat('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n);
      return (moneda ? moneda + ' ' : '') + s;
    }

    // En muchos navegadores el calendario de un input date solo se abre desde el
    // ícono. showPicker() lo abre al tocar cualquier parte del box.
    function attachPicker(input) {
      input.addEventListener('click', function () {
        if (typeof input.showPicker === 'function') { try { input.showPicker(); } catch (e) {} }
      });
    }

    function fillSelect(sel, opciones, placeholder) {
      sel.innerHTML = '';
      var ph = document.createElement('option');
      ph.value = ''; ph.textContent = placeholder; ph.disabled = true; ph.selected = true;
      sel.appendChild(ph);
      opciones.slice().sort(byLabel).forEach(function (o) {
        var opt = document.createElement('option');
        opt.value = o.value; opt.textContent = o.label;
        sel.appendChild(opt);
      });
    }

    // Select de filtro: primera opción "todos" (value ''). `ordenar`=false mantiene
    // el orden dado. Preserva la selección actual si sigue existiendo.
    function fillFiltro(sel, opciones, labelTodos, ordenar) {
      var keep = sel.value;
      sel.innerHTML = '';
      var all = document.createElement('option');
      all.value = ''; all.textContent = labelTodos;
      sel.appendChild(all);
      var lista = ordenar === false ? opciones : opciones.slice().sort(byLabel);
      lista.forEach(function (o) {
        var opt = document.createElement('option');
        opt.value = o.value; opt.textContent = o.label;
        sel.appendChild(opt);
      });
      if (keep) sel.value = keep;
    }

    // ---- Cache de vistas (It 3b) ----
    // Cambiar de pestaña disparaba siempre un google.script.run, y cada viaje
    // al server de Apps Script cuesta ~1s aunque los datos no hayan cambiado.
    // Ahora se guarda lo último que trajo cada vista: al volver, se pinta al
    // instante y solo se revalida en silencio si pasó más de REVALIDAR_MS.
    // Toda escritura borra el cache (invalidarCache), igual que el botón ↻.
    // Como la app es el único escritor, el cache no puede quedar desfasado
    // salvo que se edite la Sheet a mano: para eso está ↻.
    var REVALIDAR_MS = 90000;
    var cacheVistas = {};

    // `key` distingue combinaciones de filtros: si cambian, es otro resultado.
    function cacheGet(zona, key) {
      var e = cacheVistas[zona];
      return (e && e.key === key) ? e : null;
    }

    function cacheSet(zona, key, data) {
      cacheVistas[zona] = { key: key, data: data, ts: Date.now() };
    }

    function invalidarCache() { cacheVistas = {}; }

    // Silueta de lista mientras se espera al server (solo la primera vez que
    // se abre una vista; con cache no llega a verse).
    function skeleton(cont, filas) {
      var html = '';
      for (var i = 0; i < (filas || 5); i++) {
        html += '<div class="skel-row"><div class="skel-col">' +
                '<div class="skel-bar w60"></div><div class="skel-bar w40"></div>' +
                '</div><div class="skel-bar w80"></div></div>';
      }
      cont.innerHTML = html;
    }

    var toastTimer = null;
    function toast(msg, tipo) {
      el.toast.textContent = msg;
      el.toast.className = 'toast ' + (tipo || '');
      el.toast.hidden = false;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { el.toast.hidden = true; }, 3200);
    }

    // ---- Monto con separador de miles es-AR (miles ".", decimal ",") ----
    function formatMonto(raw) {
      var s = String(raw).replace(/[^\d,]/g, '');
      var firstComma = s.indexOf(',');
      var intPart, decPart = null;
      if (firstComma >= 0) {
        intPart = s.slice(0, firstComma).replace(/,/g, '');
        decPart = s.slice(firstComma + 1).replace(/,/g, '').slice(0, 2);
      } else {
        intPart = s;
      }
      intPart = intPart.replace(/^0+(?=\d)/, '');
      var intFmt = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      if (intFmt === '' && decPart !== null) intFmt = '0';
      return decPart !== null ? intFmt + ',' + decPart : intFmt;
    }
    function parseMonto(str) {
      return parseFloat(String(str).replace(/\./g, '').replace(',', '.'));
    }
    function montoAInput(n) {
      return formatMonto(String(n).replace('.', ','));
    }

    // ---- Cascada Tipo → Categoría → Subcategoría (form) ----
    function onTipoChange() {
      var tipo = el.tipo.value;
      var cats = distinct(
        categorias.filter(function (c) { return c.tipo === tipo; }).map(function (c) { return c.categoria; })
      ).map(function (cat) { return { value: cat, label: cat }; });
      fillSelect(el.categoria, cats, 'Elegí categoría…');
      el.categoria.disabled = false;
      fillSelect(el.subcategoria, [], 'Elegí categoría primero…');
      el.subcategoria.disabled = true;
    }
    function onCategoriaChange() {
      var tipo = el.tipo.value, cat = el.categoria.value;
      var rows = categorias.filter(function (c) { return c.tipo === tipo && c.categoria === cat; })
        .map(function (c) { return { value: c.id, label: c.subcategoria || '(sin subcategoría)' }; });
      fillSelect(el.subcategoria, rows, 'Elegí subcategoría…');
      el.subcategoria.disabled = false;
      if (rows.length === 1) el.subcategoria.value = rows[0].value;
    }
    function onTipoMedioChange() {
      var tm = el.tipomedio.value;
      var opts = medios.filter(function (m) { return m.tipo_medio === tm; })
        .map(function (m) { return { value: m.id, label: m.entidad }; });
      fillSelect(el.medio, opts, 'Elegí medio…');
      el.medio.disabled = false;
      if (opts.length === 1) el.medio.value = opts[0].value;
    }

    function setCascadaCategoria(categoriaId) {
      var c = findById(categorias, categoriaId);
      if (!c) return false;
      el.tipo.value = c.tipo; onTipoChange();
      el.categoria.value = c.categoria; onCategoriaChange();
      el.subcategoria.value = String(categoriaId);
      return true;
    }
    function setCascadaMedio(medioId) {
      var m = findById(medios, medioId);
      if (!m) return false;
      el.tipomedio.value = m.tipo_medio; onTipoMedioChange();
      el.medio.value = String(medioId);
      return true;
    }

    // ---- Modo alta / edición del form ----
    function resetFormFields() {
      el.fecha.value = hoyISO();
      fillSelect(el.tipo, optTipos, 'Elegí tipo…');
      fillSelect(el.categoria, [], 'Elegí tipo primero…'); el.categoria.disabled = true;
      fillSelect(el.subcategoria, [], 'Elegí categoría primero…'); el.subcategoria.disabled = true;
      fillSelect(el.tipomedio, optTiposMedio, 'Elegí tipo de medio…');
      fillSelect(el.medio, [], 'Elegí tipo de medio primero…'); el.medio.disabled = true;
      el.monto.value = ''; el.moneda.value = 'ARS'; el.descripcion.value = '';
    }

    function enterCreateMode() {
      editId = null;
      el.formTitle.textContent = 'Nuevo gasto';
      el.submit.textContent = 'Guardar gasto';
      el.editBanner.hidden = true;
      resetFormFields();
    }

    function enterEditMode(g) {
      editId = g.id;
      el.formTitle.textContent = 'Editar gasto';
      el.submit.textContent = 'Guardar cambios';
      el.editBanner.hidden = false;
      el.fecha.value = g.fecha;   // ya viene ISO yyyy-mm-dd desde el server
      if (!setCascadaCategoria(g.categoria_id)) {
        fillSelect(el.tipo, optTipos, 'Elegí tipo…');
        toast('La categoría original está inactiva: reelegila.', '');
      }
      if (!setCascadaMedio(g.medio_pago_id)) {
        fillSelect(el.tipomedio, optTiposMedio, 'Elegí tipo de medio…');
      }
      el.monto.value = montoAInput(g.monto);
      el.moneda.value = g.moneda || 'ARS';
      el.descripcion.value = g.descripcion || '';
      showView('form');
      window.scrollTo(0, 0);
    }

    // ---- Navegación ----
    var viewActual = 'form';
    function showView(v) {
      viewActual = v;
      var secs = document.querySelectorAll('.view');
      for (var i = 0; i < secs.length; i++) secs[i].hidden = secs[i].getAttribute('data-view') !== v;
      var tabs = document.querySelectorAll('.tab');
      for (var j = 0; j < tabs.length; j++) {
        tabs[j].classList.toggle('active', tabs[j].getAttribute('data-view') === v);
      }
    }

    // ---- Historial ----
    function onFiltroCategoriaChange() {
      var cat = el.hCategoria.value;
      var subs = distinct(
        categorias.filter(function (c) { return c.categoria === cat && c.subcategoria; })
                  .map(function (c) { return c.subcategoria; })
      ).map(function (s) { return { value: s, label: s }; });
      fillFiltro(el.hSubcategoria, subs, 'Todo seleccionado', true);
      el.hSubcategoria.disabled = !cat;
      cargarHistorial();
    }

    function limpiarFiltros() {
      el.hDesde.value = ''; el.hHasta.value = '';
      el.hCategoria.value = '';
      fillFiltro(el.hSubcategoria, [], 'Todo seleccionado', true);
      el.hSubcategoria.disabled = true;
      el.hMedio.value = '';
      el.hCuotas.value = '';
      el.hTarjeta.value = '';
      cargarHistorial();
    }

    // Estado actual de los filtros. Único lugar donde se arma el objeto, para
    // que la clave de cache sea siempre la misma (la usa también la precarga).
    function filtrosHistorial() {
      return {
        desde: el.hDesde.value,
        hasta: el.hHasta.value,
        categoria: el.hCategoria.value,
        subcategoria: el.hSubcategoria.value,
        medio_pago_id: el.hMedio.value,
        cuotas: el.hCuotas.value,
        tarjeta_id: el.hTarjeta.value
      };
    }

    function cargarHistorial() {
      var filtros = filtrosHistorial();
      var key = JSON.stringify(filtros);
      var hit = cacheGet('historial', key);
      if (hit) {
        histActuales = hit.data;
        renderHistorial(histActuales);
        if (Date.now() - hit.ts < REVALIDAR_MS) return;   // fresco: ni pedimos
      } else {
        el.histResumen.textContent = 'Cargando…';
        skeleton(el.histList, 6);
      }
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok) {
            if (!hit) el.histResumen.textContent = '✗ ' + ((res && res.error) || 'Error al listar.');
            return;
          }
          histActuales = res.data.gastos || [];
          cacheSet('historial', key, histActuales);
          renderHistorial(histActuales);
        })
        .withFailureHandler(function (err) {
          // Si ya había algo pintado desde el cache, no lo tapamos con el error.
          if (!hit) el.histResumen.textContent = '✗ Error de conexión: ' + (err && err.message ? err.message : err);
        })
        .listarGastos(filtros);
    }

    function renderHistorial(gastos) {
      el.histResumen.textContent = gastos.length + (gastos.length === 1 ? ' gasto' : ' gastos');
      if (!gastos.length) { el.histList.innerHTML = '<p class="muted">No hay gastos con esos filtros.</p>'; return; }

      var frag = document.createDocumentFragment();
      gastos.forEach(function (g) {
        var row = document.createElement('div');
        row.className = 'gasto';

        var main = document.createElement('div');
        main.className = 'gasto-main';

        var desc = document.createElement('p');
        desc.className = 'gasto-desc';
        desc.textContent = g.descripcion || '(sin descripción)';
        if (g.es_cuota) {
          var badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = g.nro_cuota ? 'cuota ' + g.nro_cuota : 'cuota';
          desc.appendChild(badge);
        }

        var meta = document.createElement('div');
        meta.className = 'gasto-meta';
        var metaTxt = fmtFecha(g.fecha) + ' · ' + g.categoria_label + ' · ' + g.medio_label;
        if (g.es_cuota && g.tarjeta_label) metaTxt += ' · 💳 ' + g.tarjeta_label;
        meta.textContent = metaTxt;

        var acc = document.createElement('div');
        acc.className = 'gasto-acciones';
        var bEd = document.createElement('button');
        bEd.className = 'icon-btn'; bEd.type = 'button'; bEd.textContent = '✎ Editar';
        bEd.setAttribute('data-edit', g.id);
        var bDel = document.createElement('button');
        bDel.className = 'icon-btn danger'; bDel.type = 'button'; bDel.textContent = '🗑 Borrar';
        bDel.setAttribute('data-del', g.id);
        acc.appendChild(bEd); acc.appendChild(bDel);

        main.appendChild(desc); main.appendChild(meta); main.appendChild(acc);

        var side = document.createElement('div');
        side.className = 'gasto-side';
        var monto = document.createElement('span');
        monto.className = 'gasto-monto';
        monto.textContent = fmtMoneda(g.monto, g.moneda);
        side.appendChild(monto);

        row.appendChild(main); row.appendChild(side);
        frag.appendChild(row);
      });
      el.histList.innerHTML = '';
      el.histList.appendChild(frag);
    }

    function onHistClick(ev) {
      var t = ev.target;
      var idEd = t.getAttribute && t.getAttribute('data-edit');
      var idDel = t.getAttribute && t.getAttribute('data-del');
      if (idEd) {
        var g = findById(histActuales, idEd);
        if (g) enterEditMode(g);
        return;
      }
      if (idDel) {
        if (!window.confirm('¿Borrar este gasto? No se puede deshacer.')) return;
        t.disabled = true;
        google.script.run
          .withSuccessHandler(function (res) {
            if (res && res.ok) { invalidarCache(); toast('✓ Gasto borrado', 'ok'); cargarHistorial(); }
            else { t.disabled = false; toast('✗ ' + ((res && res.error) || 'No se pudo borrar.'), 'err'); }
          })
          .withFailureHandler(function (err) {
            t.disabled = false;
            toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err');
          })
          .borrarGasto(idDel);
      }
    }

    // ---- Submit (alta o edición) ----
    function onSubmit(ev) {
      ev.preventDefault();
      var monto = parseMonto(el.monto.value);
      if (!isFinite(monto) || monto <= 0) { toast('El monto debe ser mayor a 0.', 'err'); el.monto.focus(); return; }
      if (!el.subcategoria.value) { toast('Elegí una categoría completa.', 'err'); return; }
      if (!el.medio.value) { toast('Elegí un medio de pago.', 'err'); return; }

      var payload = {
        fecha: el.fecha.value,
        descripcion: el.descripcion.value,
        categoria_id: el.subcategoria.value,
        medio_pago_id: el.medio.value,
        monto: monto,
        moneda: el.moneda.value
      };

      var editando = !!editId;
      el.submit.disabled = true;
      el.submit.textContent = 'Guardando…';

      var handler = google.script.run
        .withSuccessHandler(function (res) {
          el.submit.disabled = false;
          if (res && res.ok) {
            invalidarCache();   // el gasto cambia historial y, si es cuota, crédito
            if (editando) {
              toast('✓ Cambios guardados', 'ok');
              enterCreateMode();
              showView('historial');
              cargarHistorial();
            } else {
              toast('✓ Gasto guardado', 'ok');
              el.submit.textContent = 'Guardar gasto';
              el.monto.value = ''; el.descripcion.value = '';
              el.monto.focus();
            }
          } else {
            el.submit.textContent = editando ? 'Guardar cambios' : 'Guardar gasto';
            toast('✗ ' + ((res && res.error) || 'No se pudo guardar.'), 'err');
          }
        })
        .withFailureHandler(function (err) {
          el.submit.disabled = false;
          el.submit.textContent = editando ? 'Guardar cambios' : 'Guardar gasto';
          toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err');
        });

      if (editando) handler.actualizarGasto(editId, payload);
      else handler.crearGasto(payload);
    }

    // ---- Maestros (ABM) ----
    function fillDatalist(dl, valores) {
      dl.innerHTML = '';
      valores.slice().sort(function (a, b) { return String(a).localeCompare(String(b), 'es', { sensitivity: 'base' }); })
        .forEach(function (v) {
          var opt = document.createElement('option');
          opt.value = v;
          dl.appendChild(opt);
        });
    }

    function refrescarDatalists() {
      fillDatalist(el.dlTipos, distinct(maestros.categorias.map(function (c) { return c.tipo; }).filter(Boolean)));
      fillDatalist(el.dlCategorias, distinct(maestros.categorias.map(function (c) { return c.categoria; }).filter(Boolean)));
      fillDatalist(el.dlTipoMedios, distinct(maestros.medios.map(function (m) { return m.tipo_medio; }).filter(Boolean)));
    }

    function cerrarEditor() {
      mEditId = null;
      el.mEditor.hidden = true;
      el.mNuevo.hidden = false;
    }

    function abrirEditor(item) {
      mEditId = item ? item.id : null;
      var esCat = masterActual === 'categorias';
      el.mFieldsCat.hidden = !esCat;
      el.mFieldsMed.hidden = esCat;
      if (esCat) {
        el.mEditorTitle.textContent = item ? 'Editar categoría' : 'Nueva categoría';
        el.mCatTipo.value = item ? item.tipo : '';
        el.mCatCategoria.value = item ? item.categoria : '';
        el.mCatSubcategoria.value = item ? item.subcategoria : '';
      } else {
        el.mEditorTitle.textContent = item ? 'Editar medio de pago' : 'Nuevo medio de pago';
        el.mMedTipo.value = item ? item.tipo_medio : '';
        el.mMedEntidad.value = item ? item.entidad : '';
      }
      el.mEditor.hidden = false;
      el.mNuevo.hidden = true;
      el.mEditor.scrollIntoView({ block: 'nearest' });
    }

    function guardarMaestro() {
      var esCat = masterActual === 'categorias';
      el.mSave.disabled = true;
      el.mSave.textContent = 'Guardando…';

      function done(res) {
        el.mSave.disabled = false;
        el.mSave.textContent = 'Guardar';
        if (res && res.ok) {
          invalidarCache();   // cambian las etiquetas que ven todas las vistas
          toast('✓ Guardado', 'ok');
          cerrarEditor();
          cargarMaestros();
          refrescarCatalogos();
        } else {
          toast('✗ ' + ((res && res.error) || 'No se pudo guardar.'), 'err');
        }
      }
      function fail(err) {
        el.mSave.disabled = false;
        el.mSave.textContent = 'Guardar';
        toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err');
      }

      if (esCat) {
        var pc = {
          tipo: el.mCatTipo.value.trim(),
          categoria: el.mCatCategoria.value.trim(),
          subcategoria: el.mCatSubcategoria.value.trim()
        };
        if (!pc.tipo || !pc.categoria) { el.mSave.disabled = false; el.mSave.textContent = 'Guardar'; toast('Completá tipo y categoría.', 'err'); return; }
        var rc = google.script.run.withSuccessHandler(done).withFailureHandler(fail);
        if (mEditId) rc.actualizarCategoria(mEditId, pc); else rc.crearCategoria(pc);
      } else {
        var pm = { tipo_medio: el.mMedTipo.value.trim(), entidad: el.mMedEntidad.value.trim() };
        if (!pm.tipo_medio || !pm.entidad) { el.mSave.disabled = false; el.mSave.textContent = 'Guardar'; toast('Completá tipo de medio y entidad.', 'err'); return; }
        var rm = google.script.run.withSuccessHandler(done).withFailureHandler(fail);
        if (mEditId) rm.actualizarMedio(mEditId, pm); else rm.crearMedio(pm);
      }
    }

    function toggleActivoMaestro(item) {
      var esCat = masterActual === 'categorias';
      var accion = item.activo ? 'desactivar' : 'activar';
      if (!window.confirm('¿Seguro que querés ' + accion + ' este maestro?')) return;
      function done(res) {
        if (res && res.ok) { invalidarCache(); toast('✓ Actualizado', 'ok'); cargarMaestros(); refrescarCatalogos(); }
        else { toast('✗ ' + ((res && res.error) || 'No se pudo actualizar.'), 'err'); }
      }
      function fail(err) { toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err'); }
      var r = google.script.run.withSuccessHandler(done).withFailureHandler(fail);
      if (esCat) r.setActivoCategoria(item.id, !item.activo);
      else r.setActivoMedio(item.id, !item.activo);
    }

    // Borrado físico: el server solo lo permite si no hay referencias; si las
    // hay, devuelve un error que sugiere desactivar (lo mostramos tal cual).
    function eliminarMaestro(item) {
      var esCat = masterActual === 'categorias';
      var etiqueta = esCat ? (item.categoria + (item.subcategoria ? ' › ' + item.subcategoria : '')) : item.entidad;
      if (!window.confirm('¿Eliminar definitivamente "' + etiqueta + '"?\nSolo se puede si ningún gasto o compra lo usa.')) return;
      function done(res) {
        if (res && res.ok) { invalidarCache(); toast('✓ Eliminado', 'ok'); cargarMaestros(); refrescarCatalogos(); }
        else { toast('✗ ' + ((res && res.error) || 'No se pudo eliminar.'), 'err'); }
      }
      function fail(err) { toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err'); }
      var r = google.script.run.withSuccessHandler(done).withFailureHandler(fail);
      if (esCat) r.borrarCategoria(item.id); else r.borrarMedio(item.id);
    }

    // Filtra por texto libre y por estado (activos | inactivos | todos).
    function filtrarMaestros(items) {
      var esCat = masterActual === 'categorias';
      var q = (el.mBuscar.value || '').trim().toLowerCase();
      var estado = el.mEstado.value;
      return items.filter(function (it) {
        if (estado === 'activos' && !it.activo) return false;
        if (estado === 'inactivos' && it.activo) return false;
        if (!q) return true;
        var hay = esCat ? (it.tipo + ' ' + it.categoria + ' ' + it.subcategoria) : (it.tipo_medio + ' ' + it.entidad);
        return hay.toLowerCase().indexOf(q) >= 0;
      });
    }

    function renderMaestros() {
      var esCat = masterActual === 'categorias';
      var items = esCat ? maestros.categorias : maestros.medios;
      var lista = filtrarMaestros(items).sort(function (a, b) {
        // Orden: activos primero, luego por etiqueta.
        if (a.activo !== b.activo) return a.activo ? -1 : 1;
        var la = esCat ? (a.categoria + a.subcategoria) : a.entidad;
        var lb = esCat ? (b.categoria + b.subcategoria) : b.entidad;
        return String(la).localeCompare(String(lb), 'es', { sensitivity: 'base' });
      });

      var activos = items.filter(function (i) { return i.activo; }).length;
      el.mResumen.textContent = lista.length + ' de ' + items.length +
        ' · ' + activos + ' activos';

      if (!lista.length) { el.mList.innerHTML = '<p class="muted">No hay registros con ese filtro.</p>'; return; }

      var frag = document.createDocumentFragment();
      lista.forEach(function (it) {
        var row = document.createElement('div');
        row.className = 'gasto' + (it.activo ? '' : ' inactivo');

        var main = document.createElement('div');
        main.className = 'gasto-main';

        var titulo = document.createElement('p');
        titulo.className = 'gasto-desc';
        titulo.textContent = esCat ? (it.categoria + (it.subcategoria ? ' › ' + it.subcategoria : '')) : it.entidad;
        if (!it.activo) {
          var off = document.createElement('span');
          off.className = 'badge-off'; off.textContent = 'inactivo';
          titulo.appendChild(off);
        }

        var meta = document.createElement('div');
        meta.className = 'gasto-meta';
        meta.textContent = esCat ? it.tipo : it.tipo_medio;

        var acc = document.createElement('div');
        acc.className = 'gasto-acciones';
        var bEd = document.createElement('button');
        bEd.className = 'icon-btn'; bEd.type = 'button'; bEd.textContent = '✎ Editar';
        bEd.addEventListener('click', function () { abrirEditor(it); });
        var bTog = document.createElement('button');
        bTog.type = 'button';
        // Desactivar es reversible (ámbar); el rojo queda para Eliminar.
        bTog.className = 'icon-btn ' + (it.activo ? 'warn' : 'ok');
        bTog.textContent = it.activo ? '⦸ Desactivar' : '✓ Activar';
        bTog.addEventListener('click', function () { toggleActivoMaestro(it); });
        var bDel = document.createElement('button');
        bDel.type = 'button';
        bDel.className = 'icon-btn danger';
        bDel.textContent = '🗑 Eliminar';
        bDel.addEventListener('click', function () { eliminarMaestro(it); });
        acc.appendChild(bEd); acc.appendChild(bTog); acc.appendChild(bDel);

        main.appendChild(titulo); main.appendChild(meta); main.appendChild(acc);
        row.appendChild(main);
        frag.appendChild(row);
      });
      el.mList.innerHTML = '';
      el.mList.appendChild(frag);
    }

    function cargarMaestros() {
      cerrarEditor();
      var hit = cacheGet('maestros', 'x');
      if (hit) {
        maestros.categorias = hit.data.categorias;
        maestros.medios = hit.data.medios;
        refrescarDatalists();
        renderMaestros();
        if (Date.now() - hit.ts < REVALIDAR_MS) return;
      } else {
        el.mResumen.textContent = 'Cargando…';
        skeleton(el.mList, 6);
      }
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok) {
            if (!hit) el.mResumen.textContent = '✗ ' + ((res && res.error) || 'Error al cargar.');
            return;
          }
          maestros.categorias = res.data.categorias || [];
          maestros.medios = res.data.medios || [];
          cacheSet('maestros', 'x', { categorias: maestros.categorias, medios: maestros.medios });
          refrescarDatalists();
          renderMaestros();
        })
        .withFailureHandler(function (err) {
          if (!hit) el.mResumen.textContent = '✗ Error de conexión: ' + (err && err.message ? err.message : err);
        })
        .getMaestros();
    }

    function switchMaster(m) {
      masterActual = m;
      var subs = document.querySelectorAll('.subtab');
      for (var i = 0; i < subs.length; i++) subs[i].classList.toggle('active', subs[i].getAttribute('data-master') === m);
      cerrarEditor();
      renderMaestros();
    }

    // ---- Crédito (compras en cuotas) ----
    var compras = [];      // últimas compras listadas (para resolver Editar)
    var cEditId = null;    // id de compra en edición; null = alta

    // Cascada Tipo → Categoría → Subcategoría del form de compra. Mirror de la
    // del form de gasto; el value final (subcategoría) es el categoria_id que
    // heredan las cuotas.
    function onCTipoChange() {
      var tipo = el.cTipo.value;
      var cats = distinct(
        categorias.filter(function (c) { return c.tipo === tipo; }).map(function (c) { return c.categoria; })
      ).map(function (cat) { return { value: cat, label: cat }; });
      fillSelect(el.cCategoria, cats, 'Elegí categoría…');
      el.cCategoria.disabled = false;
      fillSelect(el.cSubcategoria, [], 'Elegí categoría primero…');
      el.cSubcategoria.disabled = true;
    }
    function onCCategoriaChange() {
      var tipo = el.cTipo.value, cat = el.cCategoria.value;
      var rows = categorias.filter(function (c) { return c.tipo === tipo && c.categoria === cat; })
        .map(function (c) { return { value: c.id, label: c.subcategoria || '(sin subcategoría)' }; });
      fillSelect(el.cSubcategoria, rows, 'Elegí subcategoría…');
      el.cSubcategoria.disabled = false;
      if (rows.length === 1) el.cSubcategoria.value = rows[0].value;
    }
    function setCascadaCategoriaC(categoriaId) {
      var c = findById(categorias, categoriaId);
      if (!c) return false;
      el.cTipo.value = c.tipo; onCTipoChange();
      el.cCategoria.value = c.categoria; onCCategoriaChange();
      el.cSubcategoria.value = String(categoriaId);
      return true;
    }

    function cerrarEditorCompra() {
      cEditId = null;
      el.cEditor.hidden = true;
      el.cNuevo.hidden = false;
    }

    function resetCompraFields() {
      el.cFecha.value = hoyISO();
      el.cDescripcion.value = '';
      fillSelect(el.cTarjeta, tarjetas.map(function (t) { return { value: t.id, label: t.entidad }; }), 'Elegí tarjeta…');
      fillSelect(el.cTipo, optTipos, 'Elegí tipo…');
      fillSelect(el.cCategoria, [], 'Elegí tipo primero…'); el.cCategoria.disabled = true;
      fillSelect(el.cSubcategoria, [], 'Elegí categoría primero…'); el.cSubcategoria.disabled = true;
      el.cMonto.value = ''; el.cMoneda.value = 'ARS';
      el.cNcuotas.value = ''; el.cNota.value = '';
    }

    function abrirEditorCompra(compra) {
      cEditId = compra ? compra.id : null;
      el.cEditorTitle.textContent = compra ? 'Editar compra' : 'Nueva compra';
      resetCompraFields();
      if (compra) {
        el.cFecha.value = compra.fecha_compra;   // ya viene ISO del server
        el.cDescripcion.value = compra.descripcion || '';
        if (findById(tarjetas, compra.medio_pago_id)) el.cTarjeta.value = compra.medio_pago_id;
        else toast('La tarjeta original está inactiva: reelegila.', '');
        if (!setCascadaCategoriaC(compra.categoria_id)) toast('La categoría original está inactiva: reelegila.', '');
        el.cMonto.value = montoAInput(compra.monto_total);
        el.cMoneda.value = compra.moneda || 'ARS';
        el.cNcuotas.value = compra.n_cuotas;
        el.cNota.value = compra.nota || '';
      }
      el.cEditor.hidden = false;
      el.cNuevo.hidden = true;
      el.cEditor.scrollIntoView({ block: 'nearest' });
    }

    function guardarCompra() {
      var monto = parseMonto(el.cMonto.value);
      if (!isFinite(monto) || monto <= 0) { toast('El monto total debe ser mayor a 0.', 'err'); el.cMonto.focus(); return; }
      if (!el.cTarjeta.value) { toast('Elegí una tarjeta.', 'err'); return; }
      if (!el.cSubcategoria.value) { toast('Elegí una categoría completa.', 'err'); return; }
      var ncuotas = parseInt(el.cNcuotas.value, 10);
      if (!(ncuotas >= 1)) { toast('La cantidad de cuotas debe ser 1 o más.', 'err'); el.cNcuotas.focus(); return; }

      var payload = {
        fecha_compra: el.cFecha.value,
        descripcion: el.cDescripcion.value,
        medio_pago_id: el.cTarjeta.value,
        categoria_id: el.cSubcategoria.value,
        monto_total: monto,
        n_cuotas: ncuotas,
        moneda: el.cMoneda.value,
        nota: el.cNota.value
      };

      el.cSave.disabled = true; el.cSave.textContent = 'Guardando…';
      function done(res) {
        el.cSave.disabled = false; el.cSave.textContent = 'Guardar';
        if (res && res.ok) { invalidarCache(); toast('✓ Guardado', 'ok'); cerrarEditorCompra(); cargarCompras(); }
        else { toast('✗ ' + ((res && res.error) || 'No se pudo guardar.'), 'err'); }
      }
      function fail(err) {
        el.cSave.disabled = false; el.cSave.textContent = 'Guardar';
        toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err');
      }
      var r = google.script.run.withSuccessHandler(done).withFailureHandler(fail);
      if (cEditId) r.actualizarCompra(cEditId, payload); else r.crearCompra(payload);
    }

    // Borrado físico: el server solo lo permite si no hay cuotas pagadas; si las
    // hay, devuelve un error que lo explica (lo mostramos tal cual).
    function eliminarCompra(compra) {
      if (!window.confirm('¿Eliminar la compra "' + (compra.descripcion || 'sin descripción') + '"?\nSolo se puede si no tiene cuotas pagadas.')) return;
      function done(res) {
        if (res && res.ok) { invalidarCache(); toast('✓ Eliminada', 'ok'); cargarCompras(); }
        else { toast('✗ ' + ((res && res.error) || 'No se pudo eliminar.'), 'err'); }
      }
      function fail(err) { toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err'); }
      google.script.run.withSuccessHandler(done).withFailureHandler(fail).borrarCompra(compra.id);
    }

    function renderCompras(lista) {
      el.cResumen.textContent = lista.length + (lista.length === 1 ? ' compra' : ' compras');
      if (!lista.length) { el.cList.innerHTML = '<p class="muted">No hay compras con ese filtro.</p>'; return; }

      var frag = document.createDocumentFragment();
      lista.forEach(function (c) {
        var row = document.createElement('div');
        row.className = 'gasto' + (c.completa ? ' inactivo' : '');

        var main = document.createElement('div');
        main.className = 'gasto-main';

        var desc = document.createElement('p');
        desc.className = 'gasto-desc';
        desc.textContent = c.descripcion || '(sin descripción)';
        if (c.completa) {
          var b = document.createElement('span');
          b.className = 'badge-done'; b.textContent = 'completa';
          desc.appendChild(b);
        }

        var meta = document.createElement('div');
        meta.className = 'gasto-meta';
        meta.textContent = fmtFecha(c.fecha_compra) + ' · ' + c.tarjeta_label + ' · ' + c.categoria_label;

        var prog = document.createElement('div');
        prog.className = 'progress';
        var bar = document.createElement('div');
        bar.className = 'progress-bar' + (c.completa ? ' done' : '');
        var pct = c.n_cuotas > 0 ? Math.round(100 * c.pagadas / c.n_cuotas) : 0;
        bar.style.width = Math.min(100, pct) + '%';
        prog.appendChild(bar);

        var progTxt = document.createElement('div');
        progTxt.className = 'compra-prog';
        progTxt.textContent = c.pagadas + '/' + c.n_cuotas + ' cuotas · ' + fmtMoneda(c.monto_cuota_teorico, c.moneda) + '/cuota';

        var acc = document.createElement('div');
        acc.className = 'gasto-acciones';
        var bEd = document.createElement('button');
        bEd.className = 'icon-btn'; bEd.type = 'button'; bEd.textContent = '✎ Editar';
        bEd.addEventListener('click', function () { abrirEditorCompra(c); });
        var bDel = document.createElement('button');
        bDel.className = 'icon-btn danger'; bDel.type = 'button'; bDel.textContent = '🗑 Eliminar';
        bDel.addEventListener('click', function () { eliminarCompra(c); });
        acc.appendChild(bEd); acc.appendChild(bDel);

        main.appendChild(desc); main.appendChild(meta);
        main.appendChild(prog); main.appendChild(progTxt); main.appendChild(acc);

        var side = document.createElement('div');
        side.className = 'gasto-side';
        var monto = document.createElement('span');
        monto.className = 'gasto-monto';
        monto.textContent = fmtMoneda(c.monto_total, c.moneda);
        side.appendChild(monto);
        if (c.pagado && c.pagado.length) {
          var sub = document.createElement('span');
          sub.className = 'gasto-sub';
          sub.textContent = c.pagado.map(function (p) { return 'Pagó ' + fmtMoneda(p.monto, p.moneda); }).join(' · ');
          side.appendChild(sub);
        }

        row.appendChild(main); row.appendChild(side);
        frag.appendChild(row);
      });
      el.cList.innerHTML = '';
      el.cList.appendChild(frag);
    }

    function cargarCompras() {
      cerrarEditorCompra();
      var filtros = { medio_pago_id: el.cFiltroTarjeta.value, estado: el.cFiltroEstado.value };
      var key = JSON.stringify(filtros);
      var hit = cacheGet('compras', key);
      if (hit) {
        compras = hit.data;
        renderCompras(compras);
        if (Date.now() - hit.ts < REVALIDAR_MS) return;
      } else {
        el.cResumen.textContent = 'Cargando…';
        skeleton(el.cList, 4);
      }
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok) {
            if (!hit) el.cResumen.textContent = '✗ ' + ((res && res.error) || 'Error al listar.');
            return;
          }
          compras = res.data.compras || [];
          cacheSet('compras', key, compras);
          renderCompras(compras);
        })
        .withFailureHandler(function (err) {
          if (!hit) el.cResumen.textContent = '✗ Error de conexión: ' + (err && err.message ? err.message : err);
        })
        .listarCompras(filtros);
    }

    // ---- Cuotas pendientes (subvista de Crédito, slice 2c) ----
    var credSubActual = 'compras';   // 'compras' | 'pendientes'

    function switchCredSub(sub) {
      credSubActual = sub;
      var btns = document.querySelectorAll('.subtab[data-credsub]');
      for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', btns[i].getAttribute('data-credsub') === sub);
      }
      var esComp = sub === 'compras';
      el.credCompras.hidden = !esComp;
      el.credPendientes.hidden = esComp;
      if (esComp) cargarCompras(); else cargarPendientes();
    }

    function renderPendientes(compras) {
      el.pResumen.textContent = compras.length +
        (compras.length === 1 ? ' compra con cuotas pendientes' : ' compras con cuotas pendientes');
      if (!compras.length) { el.pList.innerHTML = '<p class="muted">No hay cuotas pendientes con ese filtro.</p>'; return; }

      // Agrupar por tarjeta (medio_pago_id). Total restante estimado por moneda
      // (pendientes × cuota teórica); nunca se suman monedas distintas.
      var groups = {}, order = [];
      compras.forEach(function (c) {
        var k = c.medio_pago_id;
        if (!groups[k]) { groups[k] = { label: c.tarjeta_label, items: [], totales: {} }; order.push(k); }
        groups[k].items.push(c);
        groups[k].totales[c.moneda] = (groups[k].totales[c.moneda] || 0) + c.pendientes * c.monto_cuota_teorico;
      });

      var frag = document.createDocumentFragment();
      order.forEach(function (k) {
        var g = groups[k];
        var box = document.createElement('div');
        box.className = 'pgroup';

        var head = document.createElement('div');
        head.className = 'pgroup-head';
        var tarj = document.createElement('span');
        tarj.className = 'pgroup-tarjeta';
        tarj.textContent = g.label || '(tarjeta)';
        var tot = document.createElement('span');
        tot.className = 'pgroup-total';
        tot.innerHTML = Object.keys(g.totales).map(function (m) {
          return 'Resta <strong>' + fmtMoneda(g.totales[m], m) + '</strong>';
        }).join(' · ');
        head.appendChild(tarj); head.appendChild(tot);
        box.appendChild(head);

        g.items.forEach(function (c) {
          var row = document.createElement('div');
          row.className = 'gasto';
          var main = document.createElement('div');
          main.className = 'gasto-main';
          var desc = document.createElement('p');
          desc.className = 'gasto-desc';
          desc.textContent = c.descripcion || '(sin descripción)';
          var badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = 'próx. ' + (c.pagadas + 1) + '/' + c.n_cuotas;
          desc.appendChild(badge);
          var meta = document.createElement('div');
          meta.className = 'gasto-meta';
          meta.textContent = c.pendientes + (c.pendientes === 1 ? ' cuota restante' : ' cuotas restantes') +
            ' · ' + fmtMoneda(c.monto_cuota_teorico, c.moneda) + '/cuota';
          main.appendChild(desc); main.appendChild(meta);

          var side = document.createElement('div');
          side.className = 'gasto-side';
          var monto = document.createElement('span');
          monto.className = 'gasto-monto';
          monto.textContent = fmtMoneda(c.pendientes * c.monto_cuota_teorico, c.moneda);
          side.appendChild(monto);

          row.appendChild(main); row.appendChild(side);
          box.appendChild(row);
        });
        frag.appendChild(box);
      });
      el.pList.innerHTML = '';
      el.pList.appendChild(frag);
    }

    function cargarPendientes() {
      var filtros = { medio_pago_id: el.pTarjeta.value, estado: 'pendientes' };
      var key = JSON.stringify(filtros);
      var hit = cacheGet('pendientes', key);
      if (hit) {
        renderPendientes(hit.data);
        if (Date.now() - hit.ts < REVALIDAR_MS) return;
      } else {
        el.pResumen.textContent = 'Cargando…';
        skeleton(el.pList, 4);
      }
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok) {
            if (!hit) el.pResumen.textContent = '✗ ' + ((res && res.error) || 'Error al listar.');
            return;
          }
          var lista = res.data.compras || [];
          cacheSet('pendientes', key, lista);
          renderPendientes(lista);
        })
        .withFailureHandler(function (err) {
          if (!hit) el.pResumen.textContent = '✗ Error de conexión: ' + (err && err.message ? err.message : err);
        })
        .listarCompras(filtros);
    }

    // ---- Resumen de tarjeta (batch, slice 2b) ----
    var rItems = [];        // filas activas de la grilla: { compra_credito_id, els:{...}, suelto }
    var rGenerando = false;

    // Opciones planas de categoría "Categoría › Subcat" (value = categoria_id).
    function categoriaFlatOpts() {
      return categorias.map(function (c) {
        return { value: c.id, label: c.categoria + (c.subcategoria ? ' › ' + c.subcategoria : '') };
      }).sort(byLabel);
    }

    function fillCategoriaFlat(sel, selectedId) {
      fillSelect(sel, categoriaFlatOpts(), 'Elegí categoría…');
      if (selectedId && findById(categorias, selectedId)) sel.value = String(selectedId);
    }

    function resetResumen() {
      rItems = [];
      el.rGrid.innerHTML = '';
      el.rGridWrap.hidden = true;
      el.rConfig.hidden = false;
      el.rTotal.textContent = '';
    }

    // Suma por moneda de las filas incluidas (tildadas), sin mezclar monedas.
    function actualizarTotalResumen() {
      var porMoneda = {}, n = 0;
      rItems.forEach(function (r) {
        if (r.els.check && !r.els.check.checked) return;
        var monto = parseMonto(r.els.monto.value);
        if (!isFinite(monto) || monto <= 0) return;
        var mon = r.els.moneda.value || 'ARS';
        porMoneda[mon] = (porMoneda[mon] || 0) + monto;
        n++;
      });
      var partes = Object.keys(porMoneda).map(function (m) { return fmtMoneda(porMoneda[m], m); });
      el.rTotal.textContent = n
        ? n + (n === 1 ? ' ítem' : ' ítems') + ' · Total: ' + partes.join(' + ')
        : 'Ningún ítem tildado.';
    }

    // Construye una fila de cuota (vinculada a una compra) en la grilla.
    function agregarFilaCuota(compra) {
      var row = document.createElement('div');
      row.className = 'rrow';

      var head = document.createElement('div');
      head.className = 'rrow-head';
      var chk = document.createElement('input');
      chk.type = 'checkbox'; chk.checked = true;
      var desc = document.createElement('div');
      desc.className = 'rrow-desc';
      desc.textContent = compra.descripcion || '(sin descripción)';
      var cuota = document.createElement('span');
      cuota.className = 'rrow-cuota';
      cuota.textContent = 'cuota ' + (compra.pagadas + 1) + '/' + compra.n_cuotas;
      desc.appendChild(cuota);
      head.appendChild(chk); head.appendChild(desc);

      var cat = document.createElement('select');
      fillCategoriaFlat(cat, compra.categoria_id);

      var fila = document.createElement('div');
      fila.className = 'row';
      var montoWrap = document.createElement('label');
      montoWrap.className = 'field field-monto';
      var montoLbl = document.createElement('span'); montoLbl.textContent = 'Monto';
      var monto = document.createElement('input');
      monto.type = 'text'; monto.inputMode = 'decimal'; monto.placeholder = '0';
      montoWrap.appendChild(montoLbl); montoWrap.appendChild(monto);
      var monWrap = document.createElement('label');
      monWrap.className = 'field field-moneda';
      var monLbl = document.createElement('span'); monLbl.textContent = 'Moneda';
      var moneda = document.createElement('select');
      moneda.innerHTML = '<option value="ARS">ARS</option><option value="USD">USD</option>';
      monWrap.appendChild(monLbl); monWrap.appendChild(moneda);
      fila.appendChild(montoWrap); fila.appendChild(monWrap);

      // Default: moneda del pago = ARS. Monto: si la compra es ARS, prellenamos
      // la cuota teórica; si es USD, va vacío (se carga lo pagado en ARS) y la
      // teórica en USD se muestra solo como referencia.
      moneda.value = 'ARS';
      var ref = null;
      if (compra.moneda === 'ARS') {
        monto.value = montoAInput(compra.monto_cuota_teorico);
      } else {
        ref = document.createElement('p');
        ref.className = 'rrow-ref';
        ref.textContent = 'Cuota teórica: ' + fmtMoneda(compra.monto_cuota_teorico, compra.moneda) + ' (referencia)';
      }

      monto.addEventListener('input', function () { monto.value = formatMonto(monto.value); actualizarTotalResumen(); });
      moneda.addEventListener('change', actualizarTotalResumen);
      chk.addEventListener('change', function () { row.classList.toggle('off', !chk.checked); actualizarTotalResumen(); });

      row.appendChild(head);
      if (ref) row.appendChild(ref);
      row.appendChild(cat);
      row.appendChild(fila);
      el.rGrid.appendChild(row);

      rItems.push({ compra_credito_id: compra.id, suelto: false, els: { check: chk, cat: cat, monto: monto, moneda: moneda, desc: null } });
    }

    // Fila de gasto suelto (no vinculado a compra): descripción propia, sin k/N.
    function agregarFilaSuelto() {
      var row = document.createElement('div');
      row.className = 'rrow';

      var head = document.createElement('div');
      head.className = 'rrow-head';
      var chk = document.createElement('input');
      chk.type = 'checkbox'; chk.checked = true;
      var titulo = document.createElement('div');
      titulo.className = 'rrow-desc'; titulo.textContent = 'Gasto suelto';
      var del = document.createElement('button');
      del.type = 'button'; del.className = 'rrow-suelto-del'; del.textContent = '✕ quitar';
      head.appendChild(chk); head.appendChild(titulo); head.appendChild(del);

      var descWrap = document.createElement('label');
      descWrap.className = 'field';
      var descLbl = document.createElement('span'); descLbl.textContent = 'Descripción';
      var desc = document.createElement('input');
      desc.type = 'text'; desc.maxLength = 140; desc.placeholder = 'Ej: seguro, suscripción…';
      descWrap.appendChild(descLbl); descWrap.appendChild(desc);

      var cat = document.createElement('select');
      fillCategoriaFlat(cat, '');

      var fila = document.createElement('div');
      fila.className = 'row';
      var montoWrap = document.createElement('label');
      montoWrap.className = 'field field-monto';
      var montoLbl = document.createElement('span'); montoLbl.textContent = 'Monto';
      var monto = document.createElement('input');
      monto.type = 'text'; monto.inputMode = 'decimal'; monto.placeholder = '0';
      montoWrap.appendChild(montoLbl); montoWrap.appendChild(monto);
      var monWrap = document.createElement('label');
      monWrap.className = 'field field-moneda';
      var monLbl = document.createElement('span'); monLbl.textContent = 'Moneda';
      var moneda = document.createElement('select');
      moneda.innerHTML = '<option value="ARS">ARS</option><option value="USD">USD</option>';
      moneda.value = 'ARS';
      monWrap.appendChild(monLbl); monWrap.appendChild(moneda);
      fila.appendChild(montoWrap); fila.appendChild(monWrap);

      var item = { compra_credito_id: '', suelto: true, els: { check: chk, cat: cat, monto: monto, moneda: moneda, desc: desc } };

      monto.addEventListener('input', function () { monto.value = formatMonto(monto.value); actualizarTotalResumen(); });
      moneda.addEventListener('change', actualizarTotalResumen);
      chk.addEventListener('change', function () { row.classList.toggle('off', !chk.checked); actualizarTotalResumen(); });
      del.addEventListener('click', function () {
        var idx = rItems.indexOf(item);
        if (idx >= 0) rItems.splice(idx, 1);
        el.rGrid.removeChild(row);
        actualizarTotalResumen();
      });

      row.appendChild(head);
      row.appendChild(descWrap);
      row.appendChild(cat);
      row.appendChild(fila);
      el.rGrid.appendChild(row);
      rItems.push(item);
      actualizarTotalResumen();
    }

    function generarGrilla() {
      var tarjetaId = el.rTarjeta.value;
      var medioId = el.rMedio.value;
      if (!tarjetaId) { toast('Elegí una tarjeta.', 'err'); return; }
      if (!el.rFecha.value) { toast('Elegí la fecha de pago.', 'err'); return; }
      if (!medioId) { toast('Elegí con qué medio se paga el resumen.', 'err'); return; }
      if (rGenerando) return;
      rGenerando = true;
      el.rGenerar.disabled = true;
      el.rGenerar.textContent = 'Generando…';

      google.script.run
        .withSuccessHandler(function (res) {
          rGenerando = false;
          el.rGenerar.disabled = false;
          el.rGenerar.textContent = 'Generar grilla';
          if (!res || !res.ok) { toast('✗ ' + ((res && res.error) || 'No se pudo generar.'), 'err'); return; }
          var pend = res.data.compras || [];
          rItems = [];
          el.rGrid.innerHTML = '';
          pend.forEach(agregarFilaCuota);
          var tarj = findById(tarjetas, tarjetaId);
          el.rGridInfo.textContent = (tarj ? tarj.entidad : '') + ' · ' + fmtFecha(el.rFecha.value) +
            ' · ' + pend.length + (pend.length === 1 ? ' cuota' : ' cuotas');
          if (!pend.length) {
            el.rGrid.innerHTML = '<p class="muted">Esta tarjeta no tiene cuotas pendientes. Podés agregar gastos sueltos.</p>';
          }
          el.rConfig.hidden = true;
          el.rGridWrap.hidden = false;
          actualizarTotalResumen();
          window.scrollTo(0, 0);
        })
        .withFailureHandler(function (err) {
          rGenerando = false;
          el.rGenerar.disabled = false;
          el.rGenerar.textContent = 'Generar grilla';
          toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err');
        })
        .listarCompras({ medio_pago_id: tarjetaId, estado: 'pendientes' });
    }

    function confirmarResumenClick() {
      var incluidos = rItems.filter(function (r) { return r.els.check.checked; });
      if (!incluidos.length) { toast('Tildá al menos una cuota o agregá un gasto.', 'err'); return; }

      var items = [];
      for (var i = 0; i < incluidos.length; i++) {
        var r = incluidos[i];
        var monto = parseMonto(r.els.monto.value);
        if (!isFinite(monto) || monto <= 0) { toast('Hay un monto vacío o inválido. Revisá la grilla.', 'err'); r.els.monto.focus(); return; }
        if (!r.els.cat.value) { toast('Hay un ítem sin categoría.', 'err'); r.els.cat.focus(); return; }
        items.push({
          compra_credito_id: r.compra_credito_id,
          categoria_id: r.els.cat.value,
          monto: monto,
          moneda: r.els.moneda.value,
          descripcion: r.els.desc ? r.els.desc.value : ''
        });
      }

      var payload = { fecha: el.rFecha.value, medio_pago_id: el.rMedio.value, items: items };
      enviarResumen(payload, false);
    }

    function enviarResumen(payload, forzar) {
      el.rConfirmar.disabled = true;
      el.rConfirmar.textContent = 'Cargando…';
      function restore() { el.rConfirmar.disabled = false; el.rConfirmar.textContent = 'Confirmar y cargar'; }
      google.script.run
        .withSuccessHandler(function (res) {
          if (res && res.ok && res.data && res.data.requiereConfirmacion) {
            restore();
            var lista = (res.data.duplicados || []).join(', ');
            if (window.confirm('Ya hay pagos con esa fecha para: ' + lista + '.\n¿Cargar igual (se duplicarían)?')) {
              enviarResumen(payload, true);
            }
            return;
          }
          restore();
          if (res && res.ok) {
            invalidarCache();   // entraron gastos: cambian historial y crédito
            toast('✓ ' + res.data.insertados + ' gasto(s) cargados', 'ok');
            resetResumen();
            showView('historial');
            cargarHistorial();
          } else {
            toast('✗ ' + ((res && res.error) || 'No se pudo cargar.'), 'err');
          }
        })
        .withFailureHandler(function (err) {
          restore();
          toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err');
        })
        .confirmarResumen(payload, forzar);
    }

    // Reconstruye los globals y los selects que dependen de los catálogos
    // (form de gasto + filtros del historial) desde datos frescos del server.
    // fillFiltro preserva la selección actual, así un refresh no la pisa.
    function reconstruirDesdeCatalogos(data) {
      categorias = data.categorias || [];
      medios = data.medios || [];
      tarjetas = data.tarjetas || [];
      optTipos = distinct(categorias.map(function (c) { return c.tipo; }))
        .map(function (t) { return { value: t, label: t }; });
      optTiposMedio = distinct(
        medios.map(function (m) { return m.tipo_medio; }).filter(function (t) { return t !== 'Credito'; })
      ).map(function (t) { return { value: t, label: t }; });

      var catFiltro = distinct(categorias.map(function (c) { return c.categoria; }))
        .map(function (cat) { return { value: cat, label: cat }; });
      fillFiltro(el.hCategoria, catFiltro, 'Todo seleccionado', true);
      // Medios sin crédito: no se usan para pagar gastos.
      var medFiltro = medios.filter(function (m) { return m.tipo_medio !== 'Credito'; })
        .map(function (m) { return { value: m.id, label: m.entidad }; });
      fillFiltro(el.hMedio, medFiltro, 'Todo seleccionado', true);

      // Filtro de tarjeta de la vista de crédito y del historial.
      var tarjFiltro = tarjetas.map(function (t) { return { value: t.id, label: t.entidad }; });
      fillFiltro(el.cFiltroTarjeta, tarjFiltro, 'Todas', true);
      fillFiltro(el.hTarjeta, tarjFiltro, 'Todas', true);
      fillFiltro(el.pTarjeta, tarjFiltro, 'Todas', true);

      // Selects del resumen de tarjeta: tarjeta (crédito) y cuenta que paga
      // (medios NO crédito). fillFiltro preserva la selección en un refresh.
      fillFiltro(el.rTarjeta, tarjFiltro, 'Elegí tarjeta…', true);
      var medioPago = medios.filter(function (m) { return m.tipo_medio !== 'Credito'; })
        .map(function (m) { return { value: m.id, label: m.entidad }; });
      fillFiltro(el.rMedio, medioPago, 'Elegí medio…', true);
    }

    // Re-lee catálogos en caliente (tras un cambio de ABM o al tocar Actualizar)
    // para que el form y los filtros reflejen altas/bajas sin recargar la página.
    function refrescarCatalogos(onDone) {
      google.script.run
        .withSuccessHandler(function (res) {
          if (res && res.ok) reconstruirDesdeCatalogos(res.data);
          if (onDone) onDone(res);
        })
        .withFailureHandler(function (err) {
          if (onDone) onDone({ ok: false, error: err && err.message ? err.message : String(err) });
        })
        .getCatalogos();
    }

    // ---- Carga inicial ----
    function errorArranque(msg) {
      el.loadingStatus.textContent = '✗ ' + msg;
      el.loadingStatus.className = 'err';
    }

    // Deja la app usable con los catálogos ya en la mano.
    function arrancar(data) {
      if (!(data.categorias || []).length || !(data.medios || []).length) {
        errorArranque('Faltan categorías o medios de pago activos en la Sheet.');
        return;
      }
      reconstruirDesdeCatalogos(data);
      fillFiltro(el.hSubcategoria, [], 'Todo seleccionado', true);

      enterCreateMode();
      el.loadingCard.hidden = true;
      el.tabs.hidden = false;
      el.btnRefresh.hidden = false;
      showView('form');
      precargarHistorial();
    }

    // El historial es la vista a la que más se entra: la traemos en segundo
    // plano apenas arranca la app, así el primer clic ya la encuentra cacheada.
    function precargarHistorial() {
      var filtros = filtrosHistorial();
      var key = JSON.stringify(filtros);
      if (cacheGet('historial', key)) return;
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok) return;
          cacheSet('historial', key, res.data.gastos || []);
          // Si mientras tanto entró al Historial con estos mismos filtros,
          // lo pintamos; si cambió los filtros, no le pisamos la vista.
          if (viewActual === 'historial' && JSON.stringify(filtrosHistorial()) === key) {
            histActuales = res.data.gastos || [];
            renderHistorial(histActuales);
          }
        })
        .withFailureHandler(function () {})
        .listarGastos(filtros);
    }

    function cargarCatalogos() {
      // Camino rápido: doGet ya los mandó dentro del HTML (It 3b).
      var boot = window.__BOOT__;
      if (boot && boot.catalogos) { arrancar(boot.catalogos); return; }

      // Fallback: pedirlos por nuestra cuenta.
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok) {
            errorArranque((res && res.error) || 'No se pudieron cargar los catálogos.');
            return;
          }
          arrancar(res.data);
        })
        .withFailureHandler(function (err) {
          errorArranque('Error de conexión: ' + (err && err.message ? err.message : err));
        })
        .getCatalogos();
    }

    // ---- Wire up ----
    el.tipo.addEventListener('change', onTipoChange);
    el.categoria.addEventListener('change', onCategoriaChange);
    el.tipomedio.addEventListener('change', onTipoMedioChange);
    el.monto.addEventListener('input', function () { el.monto.value = formatMonto(el.monto.value); });
    el.form.addEventListener('submit', onSubmit);
    el.limpiar.addEventListener('click', function () { enterCreateMode(); showView('form'); });
    el.editCancel.addEventListener('click', function () { enterCreateMode(); showView('form'); });

    el.histList.addEventListener('click', onHistClick);
    el.hDesde.addEventListener('change', cargarHistorial);
    el.hHasta.addEventListener('change', cargarHistorial);
    el.hCategoria.addEventListener('change', onFiltroCategoriaChange);
    el.hSubcategoria.addEventListener('change', cargarHistorial);
    el.hMedio.addEventListener('change', cargarHistorial);
    el.hCuotas.addEventListener('change', cargarHistorial);
    el.hTarjeta.addEventListener('change', cargarHistorial);
    el.hLimpiar.addEventListener('click', limpiarFiltros);

    el.mNuevo.addEventListener('click', function () { abrirEditor(null); });
    el.mCancel.addEventListener('click', cerrarEditor);
    el.mSave.addEventListener('click', guardarMaestro);
    el.mBuscar.addEventListener('input', renderMaestros);
    el.mEstado.addEventListener('change', renderMaestros);
    var subBtns = document.querySelectorAll('.subtab');
    for (var s = 0; s < subBtns.length; s++) {
      subBtns[s].addEventListener('click', function () { switchMaster(this.getAttribute('data-master')); });
    }

    el.cTipo.addEventListener('change', onCTipoChange);
    el.cCategoria.addEventListener('change', onCCategoriaChange);
    el.cMonto.addEventListener('input', function () { el.cMonto.value = formatMonto(el.cMonto.value); });
    el.cNuevo.addEventListener('click', function () { abrirEditorCompra(null); });
    el.cCancel.addEventListener('click', cerrarEditorCompra);
    el.cSave.addEventListener('click', guardarCompra);
    el.cFiltroTarjeta.addEventListener('change', cargarCompras);
    el.cFiltroEstado.addEventListener('change', cargarCompras);
    el.pTarjeta.addEventListener('change', cargarPendientes);
    var credSubBtns = document.querySelectorAll('.subtab[data-credsub]');
    for (var cs = 0; cs < credSubBtns.length; cs++) {
      credSubBtns[cs].addEventListener('click', function () { switchCredSub(this.getAttribute('data-credsub')); });
    }

    el.rGenerar.addEventListener('click', generarGrilla);
    el.rReset.addEventListener('click', resetResumen);
    el.rAddSuelto.addEventListener('click', agregarFilaSuelto);
    el.rConfirmar.addEventListener('click', confirmarResumenClick);

    attachPicker(el.fecha);
    attachPicker(el.hDesde);
    attachPicker(el.hHasta);
    attachPicker(el.cFecha);
    attachPicker(el.rFecha);

    // Botón global: tira el cache, re-sincroniza catálogos y recarga la vista
    // actual. Es la salida cuando se editó la Sheet a mano. Gira mientras carga.
    el.btnRefresh.addEventListener('click', function () {
      el.btnRefresh.disabled = true;
      el.btnRefresh.classList.add('is-loading');
      invalidarCache();
      refrescarCatalogos(function (res) {
        el.btnRefresh.disabled = false;
        el.btnRefresh.classList.remove('is-loading');
        if (res && res.ok) {
          toast('✓ Datos actualizados', 'ok');
          if (viewActual === 'historial') cargarHistorial();
          else if (viewActual === 'maestros') cargarMaestros();
          else if (viewActual === 'credito') { if (credSubActual === 'pendientes') cargarPendientes(); else cargarCompras(); }
        } else {
          toast('✗ ' + ((res && res.error) || 'No se pudo actualizar.'), 'err');
        }
      });
    });

    var tabBtns = document.querySelectorAll('.tab');
    for (var i = 0; i < tabBtns.length; i++) {
      tabBtns[i].addEventListener('click', function () {
        var v = this.getAttribute('data-view');
        if (v === 'form') { enterCreateMode(); showView('form'); }
        else if (v === 'maestros') { showView('maestros'); cargarMaestros(); }
        else if (v === 'credito') { showView('credito'); switchCredSub('compras'); }
        else if (v === 'resumen') { showView('resumen'); if (!el.rFecha.value) el.rFecha.value = hoyISO(); }
        else { showView('historial'); cargarHistorial(); }
      });
    }

    cargarCatalogos();
  })();
</script>
