<script>
  // It 1 (1a + 1b): carga y historial de gastos. Vanilla JS, sin frameworks.
  (function () {
    'use strict';

    var $ = function (id) { return document.getElementById(id); };
    var categorias = [];   // [{id, tipo, categoria, subcategoria}] activas
    var medios = [];       // [{id, entidad, tipo_medio}] activos
    var optTipos = [];     // opciones de "Tipo" (categorías)
    var optTiposMedio = [];// opciones de "Tipo de medio" (sin Credito)
    var editId = null;     // id del gasto en edición; null = alta
    var histActuales = []; // últimos gastos listados (para resolver Editar)

    var el = {
      tabs: $('tabs'),
      loadingCard: $('loading-card'),
      loadingStatus: $('loading-status'),
      // form
      formCard: $('form-card'),
      formTitle: $('form-title'),
      editBanner: $('edit-banner'),
      editCancel: $('edit-cancel'),
      form: $('form-gasto'),
      fecha: $('f-fecha'),
      tipo: $('f-tipo'),
      categoria: $('f-categoria'),
      subcategoria: $('f-subcategoria'),
      tipomedio: $('f-tipomedio'),
      medio: $('f-medio'),
      monto: $('f-monto'),
      moneda: $('f-moneda'),
      descripcion: $('f-descripcion'),
      submit: $('f-submit'),
      limpiar: $('f-limpiar'),
      // historial
      histCard: $('historial-card'),
      hDesde: $('h-desde'),
      hHasta: $('h-hasta'),
      hCategoria: $('h-categoria'),
      hSubcategoria: $('h-subcategoria'),
      hMedio: $('h-medio'),
      hLimpiar: $('h-limpiar'),
      histResumen: $('hist-resumen'),
      histList: $('hist-list'),
      toast: $('toast')
    };

    // ---- Utilidades ----
    function hoyISO() {
      var d = new Date();
      var mm = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + mm + '-' + dd;
    }

    // ISO yyyy-mm-dd → dd/mm/yyyy para mostrar.
    function fmtFecha(iso) {
      var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(String(iso));
      return m ? m[3] + '/' + m[2] + '/' + m[1] : String(iso);
    }

    function distinct(arr) {
      var seen = {}, out = [];
      arr.forEach(function (v) { if (!seen[v]) { seen[v] = true; out.push(v); } });
      return out;
    }

    function findById(arr, id) {
      for (var i = 0; i < arr.length; i++) if (String(arr[i].id) === String(id)) return arr[i];
      return null;
    }

    function byLabel(a, b) {
      return String(a.label).localeCompare(String(b.label), 'es', { sensitivity: 'base' });
    }

    function fmtMoneda(n, moneda) {
      var s = new Intl.NumberFormat('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n);
      return (moneda ? moneda + ' ' : '') + s;
    }

    // En muchos navegadores el calendario de un input date solo se abre desde el
    // ícono. showPicker() lo abre al tocar cualquier parte del box.
    function attachPicker(input) {
      input.addEventListener('click', function () {
        if (typeof input.showPicker === 'function') { try { input.showPicker(); } catch (e) {} }
      });
    }

    function fillSelect(sel, opciones, placeholder) {
      sel.innerHTML = '';
      var ph = document.createElement('option');
      ph.value = ''; ph.textContent = placeholder; ph.disabled = true; ph.selected = true;
      sel.appendChild(ph);
      opciones.slice().sort(byLabel).forEach(function (o) {
        var opt = document.createElement('option');
        opt.value = o.value; opt.textContent = o.label;
        sel.appendChild(opt);
      });
    }

    // Select de filtro: primera opción "todos" (value ''). `ordenar`=false mantiene
    // el orden dado. Preserva la selección actual si sigue existiendo.
    function fillFiltro(sel, opciones, labelTodos, ordenar) {
      var keep = sel.value;
      sel.innerHTML = '';
      var all = document.createElement('option');
      all.value = ''; all.textContent = labelTodos;
      sel.appendChild(all);
      var lista = ordenar === false ? opciones : opciones.slice().sort(byLabel);
      lista.forEach(function (o) {
        var opt = document.createElement('option');
        opt.value = o.value; opt.textContent = o.label;
        sel.appendChild(opt);
      });
      if (keep) sel.value = keep;
    }

    var toastTimer = null;
    function toast(msg, tipo) {
      el.toast.textContent = msg;
      el.toast.className = 'toast ' + (tipo || '');
      el.toast.hidden = false;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { el.toast.hidden = true; }, 3200);
    }

    // ---- Monto con separador de miles es-AR (miles ".", decimal ",") ----
    function formatMonto(raw) {
      var s = String(raw).replace(/[^\d,]/g, '');
      var firstComma = s.indexOf(',');
      var intPart, decPart = null;
      if (firstComma >= 0) {
        intPart = s.slice(0, firstComma).replace(/,/g, '');
        decPart = s.slice(firstComma + 1).replace(/,/g, '').slice(0, 2);
      } else {
        intPart = s;
      }
      intPart = intPart.replace(/^0+(?=\d)/, '');
      var intFmt = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      if (intFmt === '' && decPart !== null) intFmt = '0';
      return decPart !== null ? intFmt + ',' + decPart : intFmt;
    }
    function parseMonto(str) {
      return parseFloat(String(str).replace(/\./g, '').replace(',', '.'));
    }
    function montoAInput(n) {
      return formatMonto(String(n).replace('.', ','));
    }

    // ---- Cascada Tipo → Categoría → Subcategoría (form) ----
    function onTipoChange() {
      var tipo = el.tipo.value;
      var cats = distinct(
        categorias.filter(function (c) { return c.tipo === tipo; }).map(function (c) { return c.categoria; })
      ).map(function (cat) { return { value: cat, label: cat }; });
      fillSelect(el.categoria, cats, 'Elegí categoría…');
      el.categoria.disabled = false;
      fillSelect(el.subcategoria, [], 'Elegí categoría primero…');
      el.subcategoria.disabled = true;
    }
    function onCategoriaChange() {
      var tipo = el.tipo.value, cat = el.categoria.value;
      var rows = categorias.filter(function (c) { return c.tipo === tipo && c.categoria === cat; })
        .map(function (c) { return { value: c.id, label: c.subcategoria || '(sin subcategoría)' }; });
      fillSelect(el.subcategoria, rows, 'Elegí subcategoría…');
      el.subcategoria.disabled = false;
      if (rows.length === 1) el.subcategoria.value = rows[0].value;
    }
    function onTipoMedioChange() {
      var tm = el.tipomedio.value;
      var opts = medios.filter(function (m) { return m.tipo_medio === tm; })
        .map(function (m) { return { value: m.id, label: m.entidad }; });
      fillSelect(el.medio, opts, 'Elegí medio…');
      el.medio.disabled = false;
      if (opts.length === 1) el.medio.value = opts[0].value;
    }

    function setCascadaCategoria(categoriaId) {
      var c = findById(categorias, categoriaId);
      if (!c) return false;
      el.tipo.value = c.tipo; onTipoChange();
      el.categoria.value = c.categoria; onCategoriaChange();
      el.subcategoria.value = String(categoriaId);
      return true;
    }
    function setCascadaMedio(medioId) {
      var m = findById(medios, medioId);
      if (!m) return false;
      el.tipomedio.value = m.tipo_medio; onTipoMedioChange();
      el.medio.value = String(medioId);
      return true;
    }

    // ---- Modo alta / edición del form ----
    function resetFormFields() {
      el.fecha.value = hoyISO();
      fillSelect(el.tipo, optTipos, 'Elegí tipo…');
      fillSelect(el.categoria, [], 'Elegí tipo primero…'); el.categoria.disabled = true;
      fillSelect(el.subcategoria, [], 'Elegí categoría primero…'); el.subcategoria.disabled = true;
      fillSelect(el.tipomedio, optTiposMedio, 'Elegí tipo de medio…');
      fillSelect(el.medio, [], 'Elegí tipo de medio primero…'); el.medio.disabled = true;
      el.monto.value = ''; el.moneda.value = 'ARS'; el.descripcion.value = '';
    }

    function enterCreateMode() {
      editId = null;
      el.formTitle.textContent = 'Nuevo gasto';
      el.submit.textContent = 'Guardar gasto';
      el.editBanner.hidden = true;
      resetFormFields();
    }

    function enterEditMode(g) {
      editId = g.id;
      el.formTitle.textContent = 'Editar gasto';
      el.submit.textContent = 'Guardar cambios';
      el.editBanner.hidden = false;
      el.fecha.value = g.fecha;   // ya viene ISO yyyy-mm-dd desde el server
      if (!setCascadaCategoria(g.categoria_id)) {
        fillSelect(el.tipo, optTipos, 'Elegí tipo…');
        toast('La categoría original está inactiva: reelegila.', '');
      }
      if (!setCascadaMedio(g.medio_pago_id)) {
        fillSelect(el.tipomedio, optTiposMedio, 'Elegí tipo de medio…');
      }
      el.monto.value = montoAInput(g.monto);
      el.moneda.value = g.moneda || 'ARS';
      el.descripcion.value = g.descripcion || '';
      showView('form');
      window.scrollTo(0, 0);
    }

    // ---- Navegación ----
    function showView(v) {
      var secs = document.querySelectorAll('.view');
      for (var i = 0; i < secs.length; i++) secs[i].hidden = secs[i].getAttribute('data-view') !== v;
      var tabs = document.querySelectorAll('.tab');
      for (var j = 0; j < tabs.length; j++) {
        tabs[j].classList.toggle('active', tabs[j].getAttribute('data-view') === v);
      }
    }

    // ---- Historial ----
    function onFiltroCategoriaChange() {
      var cat = el.hCategoria.value;
      var subs = distinct(
        categorias.filter(function (c) { return c.categoria === cat && c.subcategoria; })
                  .map(function (c) { return c.subcategoria; })
      ).map(function (s) { return { value: s, label: s }; });
      fillFiltro(el.hSubcategoria, subs, 'Todo seleccionado', true);
      el.hSubcategoria.disabled = !cat;
      cargarHistorial();
    }

    function limpiarFiltros() {
      el.hDesde.value = ''; el.hHasta.value = '';
      el.hCategoria.value = '';
      fillFiltro(el.hSubcategoria, [], 'Todo seleccionado', true);
      el.hSubcategoria.disabled = true;
      el.hMedio.value = '';
      cargarHistorial();
    }

    function cargarHistorial() {
      el.histResumen.textContent = 'Cargando…';
      el.histList.innerHTML = '';
      var filtros = {
        desde: el.hDesde.value,
        hasta: el.hHasta.value,
        categoria: el.hCategoria.value,
        subcategoria: el.hSubcategoria.value,
        medio_pago_id: el.hMedio.value
      };
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok) { el.histResumen.textContent = '✗ ' + ((res && res.error) || 'Error al listar.'); return; }
          histActuales = res.data.gastos || [];
          renderHistorial(histActuales);
        })
        .withFailureHandler(function (err) {
          el.histResumen.textContent = '✗ Error de conexión: ' + (err && err.message ? err.message : err);
        })
        .listarGastos(filtros);
    }

    function renderHistorial(gastos) {
      el.histResumen.textContent = gastos.length + (gastos.length === 1 ? ' gasto' : ' gastos');
      if (!gastos.length) { el.histList.innerHTML = '<p class="muted">No hay gastos con esos filtros.</p>'; return; }

      var frag = document.createDocumentFragment();
      gastos.forEach(function (g) {
        var row = document.createElement('div');
        row.className = 'gasto';

        var main = document.createElement('div');
        main.className = 'gasto-main';

        var desc = document.createElement('p');
        desc.className = 'gasto-desc';
        desc.textContent = g.descripcion || '(sin descripción)';
        if (g.es_cuota) {
          var badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = g.nro_cuota ? 'cuota ' + g.nro_cuota : 'cuota';
          desc.appendChild(badge);
        }

        var meta = document.createElement('div');
        meta.className = 'gasto-meta';
        meta.textContent = fmtFecha(g.fecha) + ' · ' + g.categoria_label + ' · ' + g.medio_label;

        var acc = document.createElement('div');
        acc.className = 'gasto-acciones';
        var bEd = document.createElement('button');
        bEd.className = 'icon-btn'; bEd.type = 'button'; bEd.textContent = '✎ Editar';
        bEd.setAttribute('data-edit', g.id);
        var bDel = document.createElement('button');
        bDel.className = 'icon-btn danger'; bDel.type = 'button'; bDel.textContent = '🗑 Borrar';
        bDel.setAttribute('data-del', g.id);
        acc.appendChild(bEd); acc.appendChild(bDel);

        main.appendChild(desc); main.appendChild(meta); main.appendChild(acc);

        var side = document.createElement('div');
        side.className = 'gasto-side';
        var monto = document.createElement('span');
        monto.className = 'gasto-monto';
        monto.textContent = fmtMoneda(g.monto, g.moneda);
        side.appendChild(monto);

        row.appendChild(main); row.appendChild(side);
        frag.appendChild(row);
      });
      el.histList.innerHTML = '';
      el.histList.appendChild(frag);
    }

    function onHistClick(ev) {
      var t = ev.target;
      var idEd = t.getAttribute && t.getAttribute('data-edit');
      var idDel = t.getAttribute && t.getAttribute('data-del');
      if (idEd) {
        var g = findById(histActuales, idEd);
        if (g) enterEditMode(g);
        return;
      }
      if (idDel) {
        if (!window.confirm('¿Borrar este gasto? No se puede deshacer.')) return;
        t.disabled = true;
        google.script.run
          .withSuccessHandler(function (res) {
            if (res && res.ok) { toast('✓ Gasto borrado', 'ok'); cargarHistorial(); }
            else { t.disabled = false; toast('✗ ' + ((res && res.error) || 'No se pudo borrar.'), 'err'); }
          })
          .withFailureHandler(function (err) {
            t.disabled = false;
            toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err');
          })
          .borrarGasto(idDel);
      }
    }

    // ---- Submit (alta o edición) ----
    function onSubmit(ev) {
      ev.preventDefault();
      var monto = parseMonto(el.monto.value);
      if (!isFinite(monto) || monto <= 0) { toast('El monto debe ser mayor a 0.', 'err'); el.monto.focus(); return; }
      if (!el.subcategoria.value) { toast('Elegí una categoría completa.', 'err'); return; }
      if (!el.medio.value) { toast('Elegí un medio de pago.', 'err'); return; }

      var payload = {
        fecha: el.fecha.value,
        descripcion: el.descripcion.value,
        categoria_id: el.subcategoria.value,
        medio_pago_id: el.medio.value,
        monto: monto,
        moneda: el.moneda.value
      };

      var editando = !!editId;
      el.submit.disabled = true;
      el.submit.textContent = 'Guardando…';

      var handler = google.script.run
        .withSuccessHandler(function (res) {
          el.submit.disabled = false;
          if (res && res.ok) {
            if (editando) {
              toast('✓ Cambios guardados', 'ok');
              enterCreateMode();
              showView('historial');
              cargarHistorial();
            } else {
              toast('✓ Gasto guardado', 'ok');
              el.submit.textContent = 'Guardar gasto';
              el.monto.value = ''; el.descripcion.value = '';
              el.monto.focus();
            }
          } else {
            el.submit.textContent = editando ? 'Guardar cambios' : 'Guardar gasto';
            toast('✗ ' + ((res && res.error) || 'No se pudo guardar.'), 'err');
          }
        })
        .withFailureHandler(function (err) {
          el.submit.disabled = false;
          el.submit.textContent = editando ? 'Guardar cambios' : 'Guardar gasto';
          toast('✗ Error de conexión: ' + (err && err.message ? err.message : err), 'err');
        });

      if (editando) handler.actualizarGasto(editId, payload);
      else handler.crearGasto(payload);
    }

    // ---- Carga inicial ----
    function cargarCatalogos() {
      google.script.run
        .withSuccessHandler(function (res) {
          if (!res || !res.ok) {
            el.loadingStatus.textContent = '✗ ' + ((res && res.error) || 'No se pudieron cargar los catálogos.');
            el.loadingStatus.className = 'err';
            return;
          }
          categorias = res.data.categorias || [];
          medios = res.data.medios || [];
          if (!categorias.length || !medios.length) {
            el.loadingStatus.textContent = '✗ Faltan categorías o medios de pago activos en la Sheet.';
            el.loadingStatus.className = 'err';
            return;
          }

          optTipos = distinct(categorias.map(function (c) { return c.tipo; }))
            .map(function (t) { return { value: t, label: t }; });
          optTiposMedio = distinct(
            medios.map(function (m) { return m.tipo_medio; }).filter(function (t) { return t !== 'Credito'; })
          ).map(function (t) { return { value: t, label: t }; });

          // Filtros del historial (se llenan una vez).
          var catFiltro = distinct(categorias.map(function (c) { return c.categoria; }))
            .map(function (cat) { return { value: cat, label: cat }; });
          fillFiltro(el.hCategoria, catFiltro, 'Todo seleccionado', true);
          fillFiltro(el.hSubcategoria, [], 'Todo seleccionado', true);
          // Medios sin crédito: no se usan para pagar gastos.
          var medFiltro = medios.filter(function (m) { return m.tipo_medio !== 'Credito'; })
            .map(function (m) { return { value: m.id, label: m.entidad }; });
          fillFiltro(el.hMedio, medFiltro, 'Todo seleccionado', true);

          enterCreateMode();
          el.loadingCard.hidden = true;
          el.tabs.hidden = false;
          showView('form');
        })
        .withFailureHandler(function (err) {
          el.loadingStatus.textContent = '✗ Error de conexión: ' + (err && err.message ? err.message : err);
          el.loadingStatus.className = 'err';
        })
        .getCatalogos();
    }

    // ---- Wire up ----
    el.tipo.addEventListener('change', onTipoChange);
    el.categoria.addEventListener('change', onCategoriaChange);
    el.tipomedio.addEventListener('change', onTipoMedioChange);
    el.monto.addEventListener('input', function () { el.monto.value = formatMonto(el.monto.value); });
    el.form.addEventListener('submit', onSubmit);
    el.limpiar.addEventListener('click', function () { enterCreateMode(); showView('form'); });
    el.editCancel.addEventListener('click', function () { enterCreateMode(); showView('form'); });

    el.histList.addEventListener('click', onHistClick);
    el.hDesde.addEventListener('change', cargarHistorial);
    el.hHasta.addEventListener('change', cargarHistorial);
    el.hCategoria.addEventListener('change', onFiltroCategoriaChange);
    el.hSubcategoria.addEventListener('change', cargarHistorial);
    el.hMedio.addEventListener('change', cargarHistorial);
    el.hLimpiar.addEventListener('click', limpiarFiltros);

    attachPicker(el.fecha);
    attachPicker(el.hDesde);
    attachPicker(el.hHasta);

    var tabBtns = document.querySelectorAll('.tab');
    for (var i = 0; i < tabBtns.length; i++) {
      tabBtns[i].addEventListener('click', function () {
        var v = this.getAttribute('data-view');
        if (v === 'form') { enterCreateMode(); showView('form'); }
        else { showView('historial'); cargarHistorial(); }
      });
    }

    cargarCatalogos();
  })();
</script>
