<style>
  /* =========================================================
     Tema (It 3a) — dark, sobre la paleta de marca de Valentin.
     Los colores de marca dan la identidad; los estados usan el color
     que la gente espera (rojo = borrar, ámbar = ojo con esto).
       #57CC99 (verde)  → accent: acciones primarias, activo, ok
       #1E3A5F (azul)   → superficies de énfasis (banners, cabeceras)
       #EAEAEA (claro)  → texto
       #222831 (grafito)→ cards; el fondo va un escalón más oscuro
                           para que las cards se despeguen.
     Estados fuera de marca: rojo destructivo, ámbar de advertencia/cuota.
     (El rosa #E06C9F de la marca no se usa en la app: no aportaba y
     competía con el ámbar y el rojo.)
     ========================================================= */
  :root {
    --bg: #1b2027;
    --card: #222831;
    --field: #1a1f26;
    --border: #333b47;
    --text: #eaeaea;
    --muted: #98a1ae;

    --accent: #57cc99;
    --accent-press: #45b184;
    --accent-soft: rgba(87, 204, 153, 0.14);
    --on-accent: #12181f;

    --deep: #1e3a5f;
    --deep-border: #2c5183;

    /* Azul de marca aclarado: #1e3a5f no contrasta como barra sobre fondo
       oscuro. Se usa para el progreso de cuotas en curso. */
    --blue: #4a80c4;

    --warn: #e8a33d;
    --warn-soft: rgba(232, 163, 61, 0.15);

    --ok: #57cc99;
    --err: #e5534b;
    --err-soft: rgba(229, 83, 75, 0.14);
    --radius: 14px;
    --pad: 16px;
  }

  * { box-sizing: border-box; }

  /* El atributo hidden debe ganar siempre, aun sobre reglas de clase con
     display (.tabs / .edit-banner usan flex). */
  [hidden] { display: none !important; }

  /* Hace que los widgets nativos (lista desplegada de un select, calendario de
     un input date, scrollbars) se rendericen en oscuro y no en blanco. */
  html { color-scheme: dark; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
    padding: var(--pad);
    padding-bottom: max(var(--pad), env(safe-area-inset-bottom));
  }

  .topbar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }
  .topbar h1 {
    font-size: 1.4rem;
    margin: 8px 0 16px;
    letter-spacing: -0.01em;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--pad);
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 1.05rem;
    margin: 0 0 14px;
  }

  .muted { color: var(--muted); font-size: 0.85rem; }
  .ok { color: var(--ok); }
  .err { color: var(--err); }

  /* --- Tabs --- */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1;
    min-width: 0;
    min-height: 44px;
    padding: 0 4px;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
  }
  .tab:hover { color: var(--text); border-color: var(--deep-border); }
  .tab.active {
    color: var(--on-accent);
    background: var(--accent);
    border-color: var(--accent);
  }
  .tab.active:hover { color: var(--on-accent); border-color: var(--accent); }

  /* --- Form --- */
  .field {
    display: block;
    margin-bottom: 14px;
  }
  .field > span {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field .opt { font-style: normal; color: var(--muted); opacity: 0.7; }

  input, select {
    width: 100%;
    font-size: 1.05rem;
    color: var(--text);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 12px;
    min-height: 48px;
    appearance: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  select:disabled { opacity: 0.5; }
  ::placeholder { color: var(--muted); opacity: 0.7; }

  /* Flecha ▾ propia: appearance:none borra la nativa. SVG inline (data-URI),
     sin CDN. Aplica también a los inputs con datalist (Maestros), que también
     se despliegan. */
  select,
  input[list] {
    padding-right: 38px;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'%3E%3Cpath d='M1 1.75 6 6.25 11 1.75' fill='none' stroke='%2398a1ae' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 13px center;
    background-size: 12px 8px;
  }
  select:disabled { background-image: none; }

  /* El ícono de calendario nativo es oscuro sobre fondo oscuro: lo invertimos. */
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    opacity: 0.55;
    cursor: pointer;
  }

  /* El reset de arriba (appearance:none, width:100%) rompe los checkboxes:
     los restauramos a su render nativo. */
  input[type="checkbox"] {
    width: 22px;
    height: 22px;
    min-height: 22px;
    padding: 0;
    appearance: auto;
    -webkit-appearance: auto;
    accent-color: var(--accent);
  }

  .row {
    display: flex;
    gap: 12px;
  }
  .field-monto { flex: 2; }
  .field-moneda { flex: 1; }

  .btn {
    width: 100%;
    min-height: 52px;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--on-accent);
    background: var(--accent);
    border: none;
    border-radius: 12px;
    padding: 14px;
    margin-top: 4px;
    cursor: pointer;
  }
  .btn:hover { background: var(--accent-press); }
  .btn:active { background: var(--accent-press); }
  .btn:disabled { opacity: 0.55; cursor: default; }
  .btn:disabled:hover { background: var(--accent); }

  .btn-sec {
    width: 100%;
    min-height: 48px;
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    margin-top: 10px;
    cursor: pointer;
  }
  .btn-sec:hover { color: var(--text); border-color: var(--deep-border); }
  .btn-sec:active { background: rgba(255, 255, 255, 0.04); }

  /* Separación entre un botón de acción (➕ Nueva compra / ➕ Agregar) y la
     fila de filtros que viene abajo: quedaban pegados. */
  .btn + .filtros-row,
  .btn-sec + .filtros-row { margin-top: 22px; }

  .hist-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
  }

  .link {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 0.9rem;
    cursor: pointer;
    padding: 4px 0;
  }
  .link:hover { color: var(--accent-press); }
  .link:disabled { opacity: 0.55; cursor: default; }

  /* --- Banner de edición --- */
  .edit-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: var(--deep);
    border: 1px solid var(--deep-border);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 12px;
    font-size: 0.9rem;
  }

  /* --- Filtros del historial (2 filas: fechas arriba, selects abajo) --- */
  .filtros { margin-bottom: 12px; }
  .filtros-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .filtros-row:last-child { margin-bottom: 0; }
  .filtros-row .field {
    flex: 1;
    min-width: 0;
    margin-bottom: 0;
  }

  /* --- Lista de gastos --- */
  .gasto {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 0;
    border-top: 1px solid var(--border);
  }
  .gasto:first-child { border-top: none; }
  .gasto-main { flex: 1; min-width: 0; }
  .gasto-desc {
    font-size: 0.98rem;
    margin: 0 0 3px;
    word-break: break-word;
  }
  .gasto-meta { font-size: 0.8rem; color: var(--muted); }
  .gasto-side {
    text-align: right;
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .gasto-monto { font-size: 1rem; font-weight: 600; }
  .badge {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--warn);
    background: var(--warn-soft);
    border-radius: 6px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .gasto-acciones { display: flex; gap: 10px; }
  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 4px;
  }
  .icon-btn:hover { color: var(--text); }
  .icon-btn.danger { color: var(--err); }   /* eliminar / borrar: irreversible */
  .icon-btn.warn { color: var(--warn); }    /* desactivar: reversible */
  .icon-btn.ok { color: var(--ok); }

  .gasto.inactivo { opacity: 0.5; }
  .badge-off {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--muted);
    background: rgba(152, 161, 174, 0.15);
    border-radius: 6px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* --- Progreso de cuotas (Crédito) --- */
  .progress {
    height: 7px;
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin: 8px 0 4px;
  }
  .progress-bar {
    height: 100%;
    background: var(--blue);
    border-radius: 6px 0 0 6px;
    transition: width 0.2s ease;
  }
  .progress-bar.done { background: var(--accent); }
  .compra-prog {
    font-size: 0.8rem;
    color: var(--muted);
  }
  .badge-done {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 6px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .gasto-sub { font-size: 0.8rem; color: var(--muted); }

  /* --- Grilla del resumen de tarjeta (batch) --- */
  .rrow {
    border-top: 1px solid var(--border);
    padding: 14px 0;
  }
  .rrow:first-child { border-top: none; }
  .rrow.off { opacity: 0.45; }
  .rrow-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .rrow-head input[type="checkbox"] { flex: none; }
  .rrow-desc { font-size: 0.98rem; font-weight: 600; word-break: break-word; }
  .rrow-cuota {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--warn);
    background: var(--warn-soft);
    border-radius: 6px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .rrow-ref { font-size: 0.78rem; color: var(--muted); margin: 2px 0 8px; }
  .rrow .field { margin-bottom: 8px; }
  .rrow-suelto-del {
    margin-left: auto;
    color: var(--err);
    background: none;
    border: none;
    font-size: 0.85rem;
    cursor: pointer;
    padding: 4px;
  }

  /* --- Grupos de cuotas pendientes por tarjeta --- */
  .pgroup { margin-bottom: 18px; }
  .pgroup-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 0 6px;
    border-bottom: 2px solid var(--accent);
    margin-bottom: 4px;
  }
  .pgroup-tarjeta { font-size: 0.98rem; font-weight: 700; }
  .pgroup-total { font-size: 0.85rem; color: var(--muted); text-align: right; white-space: nowrap; }
  .pgroup-total strong { color: var(--text); font-weight: 600; }

  /* --- Subtabs (Maestros) --- */
  .subtabs {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .subtab {
    flex: 1;
    min-height: 40px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--muted);
    background: var(--field);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
  }
  .subtab:hover { color: var(--text); }
  .subtab.active {
    color: var(--text);
    background: var(--deep);
    border-color: var(--deep-border);
  }

  /* --- Editor inline (ABM) --- */
  .editor {
    border: 1px solid var(--deep-border);
    background: rgba(30, 58, 95, 0.22);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .editor-title { font-size: 1rem; margin: 0 0 12px; }

  /* --- Toast --- */
  .toast {
    position: fixed;
    left: 50%;
    bottom: max(20px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    max-width: 90%;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 0.95rem;
    color: var(--text);
    background: #2c333e;
    border: 1px solid var(--border);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
    z-index: 10;
  }
  .toast.ok  { background: #1f6b52; border-color: #2c8a6b; color: #eafff5; }
  .toast.err { background: #7a2f2b; border-color: #a8453d; color: #ffeceb; }

  /* =========================================================
     Desktop (It 3a): hasta acá todo es la vista mobile. A partir
     de 900px la app usa el ancho: contenedor más grande, tipografía
     un toque mayor y formularios en 2 columnas.
     ========================================================= */
  @media (min-width: 900px) {
    .app {
      max-width: 1040px;
      padding: 24px 28px 40px;
    }

    .topbar h1 { font-size: 1.75rem; margin: 4px 0 20px; }
    .topbar .link { font-size: 1rem; }

    .card {
      padding: 22px 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.25);
    }
    .card-title { font-size: 1.2rem; margin-bottom: 18px; }

    .tabs { gap: 8px; margin-bottom: 20px; }
    .tab { min-height: 48px; font-size: 0.95rem; padding: 0 12px; }

    .subtabs { max-width: 420px; }

    /* Formularios en 2 columnas. Los contenedores son los que tienen los
       .field como hijos directos. */
    #form-gasto,
    #c-editor,
    #r-config,
    #m-fields-cat,
    #m-fields-med {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      column-gap: 20px;
      align-items: start;
    }
    #c-editor > .editor-title { grid-column: 1 / -1; }

    /* Botones: no ocupan todo el ancho en desktop. */
    #form-gasto > .btn,
    #form-gasto > .btn-sec,
    #c-editor > .btn,
    #c-editor > .btn-sec,
    #m-editor > .btn,
    #m-editor > .btn-sec,
    #r-config > .btn,
    #r-confirmar,
    #r-add-suelto,
    #c-nuevo,
    #m-nuevo {
      width: auto;
      min-width: 210px;
      justify-self: start;
      margin-top: 8px;
      padding-left: 28px;
      padding-right: 28px;
    }
    /* Estos no viven dentro de un grid: inline-block para que width:auto
       realmente los achique al contenido. */
    #m-editor > .btn,
    #m-editor > .btn-sec,
    #r-confirmar,
    #r-add-suelto,
    #c-nuevo,
    #m-nuevo { display: inline-block; }
    #m-editor > .btn-sec { margin-top: 8px; margin-left: 10px; }

    /* "Generar grilla" comparte fila con "Se paga con": lo bajamos al pie de
       la celda descontando el margin del .field y le damos la misma altura
       que el select, para que ambos queden centrados a la misma línea. */
    #r-config > .btn {
      align-self: end;
      min-height: 48px;
      margin: 0 0 14px;
    }

    /* Filtros: un poco más de aire y campos que no se estiren de más. */
    .filtros-row { gap: 16px; }
    .btn + .filtros-row,
    .btn-sec + .filtros-row { margin-top: 26px; }

    /* Lista de gastos: acciones a la derecha, más aire por fila. */
    .gasto { padding: 14px 0; gap: 18px; }
    .gasto-desc { font-size: 1.02rem; }
    .gasto-meta { font-size: 0.85rem; }
    .gasto-monto { font-size: 1.1rem; }

    /* Grilla del resumen: cada ítem usa 2 columnas (categoría | monto+moneda);
       la cabecera y la referencia de cuota teórica ocupan el ancho completo. */
    .rrow {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      column-gap: 20px;
      align-items: end;
      padding: 16px 0;
    }
    .rrow-head,
    .rrow-ref { grid-column: 1 / -1; }

    .pgroup-tarjeta { font-size: 1.05rem; }
    .toast { font-size: 1rem; }
  }
</style>
